<!DOCTYPE html>
<html lang="en" data-arabic-font="default">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" id="theme-color-meta" content="#fcfaf7">
    <meta name="version" content="7.0.0">
    <title>The Qur'an</title>

    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="apple-touch-icon" href="./icon-192.png">
</head>

<body>
    <div id="home-view">
        <div class="home-header">
            <div></div>
            <h1 class="header-title">The Qur'an</h1>
            <div class="header-actions">
                <button id="open-settings-btn" class="icon-btn" aria-label="Settings">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
                    </svg>
                </button>
            </div>
        </div>
        <div id="loading" style="text-align: center; color: var(--text-muted);">Opening library...</div>
        <ul id="surah-list"></ul>
    </div>

    <div id="settings-view" class="hidden">
        <div class="settings-container">
            <div class="settings-header">
                <button class="settings-back-btn" id="close-settings-btn">
                    <svg viewBox="0 0 24 24">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg> Back
                </button>
                <h2>Settings</h2>
            </div>

            <div class="setting-group">
                <label>Display & Content</label>
                <div style="display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.5rem;">
                    <label for="font-size-slider" style="margin: 0; font-size: 0.8rem;">Text Size: <span
                            id="font-size-val" style="color: var(--accent-primary);">1.00</span>x</label>
                    <input type="range" id="font-size-slider" min="0.75" max="1.5" step="0.05" value="1"
                        style="width: 100%; cursor: pointer;">
                </div>
                <div class="setting-row">
                    <span class="setting-text">Arabic Font</span>
                    <select id="arabic-font-select" class="top-control" style="width: 55%;">
                        <option value="default">Default</option>
                        <option value="uthmanic">Uthmanic Hafs</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="setting-text">Translation</span>
                    <select id="translation-select" class="top-control" style="width: 55%;">
                        <option value="en.itani.xml">English (Itani)</option>
                        <option value="en.sahih.xml">English (Sahih)</option>
                        <option value="en.yusufali.xml">English (Yusuf Ali)</option>
                        <option value="en.transliteration.xml">English (Transliteration)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="setting-text">Theme</span>
                    <button id="theme-toggle" class="top-control" style="width: 55%;">🌙 Dark Mode</button>
                </div>
            </div>

            <div class="setting-group">
                <label>Audio Settings</label>
                <div class="setting-row">
                    <span class="setting-text">Playback Source</span>
                    <select id="audio-mode-select" class="top-control" style="width: 55%;">
                        <option value="mp3">Recitation</option>
                        <option value="tts">Text-to-Speech (TTS)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="setting-text">Recitation</span>
                    <select id="reciter-select" class="top-control" style="width: 55%;">
                        <option value="Alafasy_128kbps">Al-Afasy (Arabic)</option>
                        <option value="Abdul_Basit_Mujawwad_128kbps">Abdul Basit (Arabic)</option>
                        <option value="English/Sahih_Intnl_Ibrahim_Walk_192kbps">Sahih Intl (English)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="setting-text">TTS Voice</span>
                    <select id="tts-voice-select" class="top-control" style="width: 55%;">
                        <option value="">Loading voices...</option>
                    </select>
                </div>
            </div>

            <div class="setting-group">
                <label>Reading Automations</label>
                <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                    <label for="scroll-speed-slider" style="margin: 0; font-size: 0.8rem;">Auto-scroll Delay: <span
                            id="speed-val" style="color: var(--accent-primary);">400</span> ms/word</label>
                    <input type="range" id="scroll-speed-slider" min="150" max="1000" step="50" value="400"
                        style="width: 100%; cursor: pointer;">
                </div>
            </div>

            <div class="setting-group">
                <label>Saved Bookmarks</label>
                <ul id="bookmarks-list" class="bookmarks-list"></ul>
            </div>
        </div>
    </div>

    <div id="surah-view" class="hidden">
        <div class="header-assembly">
            <div class="top-bar">
                <div id="persistent-chapter-title" class="persistent-title"></div>
                <div id="persistent-verse-number" class="persistent-verse"></div>
            </div>
            <div class="tabs-bar">
                <div class="tab-btn active" id="tab-trans" onclick="switchTabTo('trans')">Translation</div>
                <div class="tab-btn" id="tab-arabic" onclick="switchTabTo('arabic')">Qur'an</div>
                <button id="header-autoscroll-btn" class="header-icon-btn" aria-label="Toggle Auto Scroll">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4l-4 4h3v4h2V8h3l-4-4zm-4 12v2h8v-2H8zm0 4v2h8v-2H8z" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="continue-banner" class="continue-banner hidden"></div>

        <div class="tab-carousel" id="tab-carousel">
            <div class="vertical-feed" id="trans-feed"></div>
            <div class="vertical-feed" id="arabic-feed"></div>
        </div>

        <div id="swipe-hint" class="swipe-hint hidden">
            <svg viewBox="0 0 24 24">
                <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
            <span>Swipe up</span>
        </div>

        <div class="bottom-bar">
            <div class="progress-hit-area" id="progress-track">
                <div id="scrubber-tooltip" class="scrubber-tooltip"></div>
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-icon-btn" id="prev-surah-btn" aria-label="Previous Surah">
                    <svg viewBox="0 0 24 24">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <button class="nav-icon-btn" id="home-btn" aria-label="Library">
                    <svg viewBox="0 0 24 24">
                        <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                        <line x1="4" y1="10" x2="20" y2="10"></line>
                        <line x1="10" y1="4" x2="10" y2="20"></line>
                    </svg>
                </button>
                <button class="nav-icon-btn" id="next-surah-btn" aria-label="Next Surah">
                    <svg viewBox="0 0 24 24">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
