<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" id="theme-color-meta" content="#fcfaf7">
    <meta name="version" content="4.4">
    <title>The Qur'an</title>
    <style>
        :root {
            /* Light Theme */
            --bg-base: #fcfaf7;
            --bg-gradient: linear-gradient(180deg, #fdfbf7 0%, #f1f2f6 100%);
            --text-main: #2d3436;
            --text-muted: #57606f;
            --card-bg: #ffffff;
            --card-border: rgba(0, 0, 0, 0.02);
            --card-shadow: rgba(0, 0, 0, 0.03);
            --accent-primary: #e67e22;
            --accent-secondary: #3498db;
            --nav-bg: rgba(255, 255, 255, 0.25);
            --nav-border: rgba(0, 0, 0, 0.05);
            --btn-bg: #ffffff;
            --btn-hover: #3498db;
            --hover-highlight: rgba(230, 126, 34, 0.1);
            --progress-bg: rgba(0, 0, 0, 0.05);
            --danger: #e74c3c;
        }

        [data-theme="dark"] {
            /* Midnight Pop Theme */
            --bg-base: #0f172a;
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --card-border: rgba(255, 255, 255, 0.05);
            --card-shadow: rgba(0, 0, 0, 0.4);
            --accent-primary: #fbbf24;
            --accent-secondary: #22d3ee;
            --nav-bg: rgba(15, 23, 42, 0.25);
            --nav-border: rgba(255, 255, 255, 0.1);
            --btn-bg: #334155;
            --btn-hover: #22d3ee;
            --hover-highlight: rgba(251, 191, 36, 0.15);
            --progress-bg: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100dvh;
            font-family: 'Georgia', serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        .invisible {
            visibility: hidden !important;
        }

        /* Smooth Content Swapping */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* --- Landing Page --- */
        #home-view {
            height: 100dvh;
            width: 100vw;
            overflow-y: auto;
            padding: 5rem 1.5rem 4rem 1.5rem;
            background: var(--bg-gradient);
            position: relative;
        }

        .header-actions {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 10;
        }

        .icon-btn {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--nav-border);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px var(--card-shadow);
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            border-color: var(--accent-secondary);
            transform: scale(1.05);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .icon-btn.active {
            color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .icon-btn.active svg {
            fill: currentColor;
        }

        .header-title {
            text-align: center;
            margin-bottom: 3rem;
            margin-top: 1rem;
            color: var(--accent-primary);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.8rem;
            font-weight: 300;
        }

        #surah-list {
            list-style: none;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 6rem;
        }

        .surah-item {
            padding: 1.2rem 1.5rem;
            margin-bottom: 0.8rem;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--card-shadow);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            transition: 0.2s;
        }

        .surah-item-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .surah-name {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .surah-translation {
            font-size: 0.85rem;
            font-family: sans-serif;
            opacity: 0.8;
        }

        .surah-item:hover {
            background-color: var(--hover-highlight);
            transform: scale(1.02);
        }

        .surah-item:hover .surah-name {
            color: var(--accent-primary);
        }

        /* --- Settings View --- */
        #settings-view {
            height: 100dvh;
            width: 100vw;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            background: var(--bg-gradient);
        }

        .settings-container {
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 4rem;
        }

        .settings-header {
            display: flex;
            align-items: center;
            margin-bottom: 3rem;
            gap: 1.5rem;
        }

        .settings-header h2 {
            color: var(--accent-primary);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .setting-group {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px var(--card-shadow);
        }

        .setting-group label {
            display: block;
            margin-bottom: 1rem;
            font-weight: bold;
            color: var(--text-main);
            font-family: sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .setting-text {
            font-size: 0.95rem;
            font-family: sans-serif;
            color: var(--text-main);
        }

        .top-control {
            background: var(--bg-base);
            color: var(--text-main);
            border: 1px solid var(--nav-border);
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            width: 100%;
            outline: none;
            transition: all 0.2s ease;
        }

        .top-control:hover {
            border-color: var(--accent-secondary);
        }

        /* Bookmarks list */
        .bookmarks-list {
            list-style: none;
            margin-top: 1rem;
        }

        .bookmark-item {
            background: var(--bg-base);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .bookmark-item:hover {
            border-color: var(--accent-secondary);
        }

        .bookmark-info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .bookmark-title {
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
        }

        .bookmark-snippet {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .bookmark-delete {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 5px;
        }

        .bookmark-delete:hover {
            background: rgba(231, 76, 60, 0.1);
        }

        .bookmark-delete svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* --- Swiping Feed View --- */
        #surah-view {
            position: relative;
            height: 100dvh;
            width: 100vw;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: var(--nav-bg);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--nav-border);
            z-index: 100;
            height: 60px;
        }

        .persistent-title {
            font-size: 0.9rem;
            color: var(--accent-primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .persistent-verse {
            font-size: 0.8rem;
            color: var(--accent-secondary);
            font-family: sans-serif;
            letter-spacing: 1px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Floating Auto-Scroll Button */
        .floating-autoscroll {
            position: fixed;
            top: calc(75px + env(safe-area-inset-top, 0px));
            right: 1.5rem;
            z-index: 90;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-top: 1px solid var(--nav-border);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        /* Scrubbable Progress Bar */
        .progress-hit-area {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 20px;
            cursor: pointer;
            z-index: 101;
            display: flex;
            align-items: center;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: var(--progress-bg);
            pointer-events: none;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-secondary);
            box-shadow: 0 0 10px var(--accent-secondary);
            transition: width 0.1s linear;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.5rem;
            padding-bottom: calc(1.2rem + env(safe-area-inset-bottom, 0px));
        }

        .nav-btn {
            background: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--nav-border);
            padding: 0.6rem 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: sans-serif;
            font-weight: bold;
            box-shadow: 0 2px 8px var(--card-shadow);
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: var(--btn-hover);
            color: #fff;
        }

        #home-btn {
            background: var(--accent-primary);
            color: #000;
            border-color: var(--accent-primary);
        }

        .feed-container {
            height: 100dvh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .feed-container::-webkit-scrollbar {
            display: none;
        }

        .verse-screen {
            height: 100dvh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6rem 2rem 8rem 2rem;
            text-align: center;
            position: relative;
        }

        /* Verse Bottom Actions (Bookmark & Play) with Scroll Fading */
        .verse-actions {
            position: absolute;
            bottom: calc(85px + env(safe-area-inset-bottom, 0px));
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        /* 30% transparency while feed is actively scrolling */
        .feed-container.is-scrolling .verse-actions {
            opacity: 0.3;
            pointer-events: none;
        }

        .bookmark-btn:not(.active) svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linejoin: round;
            stroke-linecap: round;
        }

        .play-btn.playing {
            color: var(--accent-secondary);
            border-color: var(--accent-secondary);
        }

        .verse-text {
            font-size: 2rem;
            line-height: 1.6;
            max-width: 800px;
            text-wrap: balance;
            color: var(--text-main);
        }

        .verse-text.long-verse {
            font-size: 1.4rem;
        }

        .verse-text.extra-long-verse {
            font-size: 1.1rem;
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text-main);
            color: var(--bg-base);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-family: sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

        #toast-container.show {
            opacity: 0.95;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            .verse-text {
                font-size: 1.5rem;
            }

            .verse-text.long-verse {
                font-size: 1.2rem;
            }

            .verse-text.extra-long-verse {
                font-size: 1.05rem;
            }

            .verse-actions,
            .floating-autoscroll {
                right: 1rem;
            }

            .verse-actions .icon-btn,
            .floating-autoscroll .icon-btn {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>

    <div id="home-view">
        <div class="header-actions">
            <button id="open-settings-btn" class="icon-btn" aria-label="Settings">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
                </svg>
            </button>
        </div>
        <h1 class="header-title">The Qur'an</h1>
        <div id="loading" style="text-align: center; color: var(--text-muted);">Opening library...</div>
        <ul id="surah-list"></ul>
    </div>

    <div id="settings-view" class="hidden">
        <div class="settings-container">
            <div class="settings-header">
                <button class="nav-btn" id="close-settings-btn">← Back</button>
                <h2>Settings</h2>
            </div>

            <div class="setting-group">
                <label>Display & Content</label>
                <div class="setting-row">
                    <span class="setting-text">Translation</span>
                    <select id="translation-select" class="top-control" style="width: 55%;">
                        <option value="en.itani.xml">English (Itani)</option>
                        <option value="en.sahih.xml">English (Sahih)</option>
                        <option value="en.yusufali.xml">English (Yusuf Ali)</option>
                        <option value="en.transliteration.xml">English (Transliteration)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="setting-text">Theme</span>
                    <button id="theme-toggle" class="top-control" style="width: 55%;">🌙 Dark Mode</button>
                </div>
            </div>

            <div class="setting-group">
                <label>Reading Automations</label>
                <div class="setting-row">
                    <span class="setting-text">Auto-Advance with Audio</span>
                    <input type="checkbox" id="audio-advance-toggle" style="transform: scale(1.3); cursor: pointer;">
                </div>
                <hr style="border: 0; border-top: 1px solid var(--card-border); margin: 1.5rem 0;">
                <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                    <label for="scroll-speed-slider" style="margin: 0; font-size: 0.8rem;">Auto-scroll Delay: <span
                            id="speed-val" style="color: var(--accent-primary);">400</span> ms/word</label>
                    <input type="range" id="scroll-speed-slider" min="150" max="1000" step="50" value="400"
                        style="width: 100%; cursor: pointer;">
                </div>
            </div>

            <div class="setting-group">
                <label>Saved Bookmarks</label>
                <ul id="bookmarks-list" class="bookmarks-list"></ul>
            </div>
        </div>
    </div>

    <div id="surah-view" class="hidden">
        <div class="top-bar">
            <div id="persistent-chapter-title" class="persistent-title"></div>
            <div id="persistent-verse-number" class="persistent-verse"></div>
        </div>

        <div class="floating-autoscroll">
            <button id="global-autoscroll-btn" class="icon-btn hidden" aria-label="Toggle Auto Scroll">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4l-4 4h3v4h2V8h3l-4-4zm-4 12v2h8v-2H8zm0 4v2h8v-2H8z" />
                </svg>
            </button>
        </div>

        <div class="feed-container" id="feed-container"></div>

        <div class="bottom-bar">
            <div class="progress-hit-area" id="progress-track">
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>
            <div class="nav-buttons">
                <div style="flex:1; display:flex;"><button class="nav-btn" id="prev-surah-btn">← Prev</button></div>
                <div style="flex:1; display:flex; justify-content:center;"><button class="nav-btn"
                        id="home-btn">Home</button></div>
                <div style="flex:1; display:flex; justify-content:flex-end;"><button class="nav-btn"
                        id="next-surah-btn">Next →</button></div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // --- Prevent Auto Scroll Restoration Bug ---
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }

        const SVG_BOOKMARK = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;

        // --- GLOBAL STATE ---
        let currentTranslationFile = localStorage.getItem('translationFile') || 'en.itani.xml';

        // App Initialization
        window.onload = async () => {
            initSettings();
            renderBookmarks();
            initGlobalAutoScroll();
            await loadQuran();

            const hash = window.location.hash;
            if (hash.startsWith('#surah-')) displaySurah(hash.replace('#surah-', ''));

            else displayHome();

            initScrollingFades(feedContainer);

        // --- Toast Notifications ---
        let toastTimer = null;
        function showToast(message) {
            const toast = document.getElementById('toast-container');
            toast.innerText = message;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // --- Scrolling & UI Effects ---
        function initScrollingFades(feed) {
            let scrollFadeTimer = null;
            feed.addEventListener('scroll', () => {
                updateProgressBar();
                feed.classList.add('is-scrolling');
                clearTimeout(scrollFadeTimer);
                scrollFadeTimer = setTimeout(() => {
                    feed.classList.remove('is-scrolling');
                }, 200);
            });
        }

        function initGlobalAutoScroll() {
            const autoScrollBtn = document.getElementById('global-autoscroll-btn');
            autoScrollBtn.onclick = () => {
                isAutoScrolling = !isAutoScrolling;
                autoScrollBtn.classList.toggle('active', isAutoScrolling);

                    showToast("Auto-scroll Enabled");
                    triggerAutoScroll(document.querySelector(`[data-verse="${globalActiveVerse}"]`));
                } else {
                    showToast("Auto-scroll Disabled");
                    clearTimeout(autoScrollTimer);
                }
            };
        }

        // --- Settings Initialization ---
        function initSettings() {
            const themeBtn = document.getElementById('theme-toggle');
            const themeMeta = document.getElementById('theme-color-meta');

            let currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

            const applyTheme = (t) => {
                document.documentElement.setAttribute('data-theme', t);
                themeBtn.innerText = t === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
                themeMeta.setAttribute('content', t === 'dark' ? '#0f172a' : '#fcfaf7');
            };

            applyTheme(currentTheme);
            themeBtn.onclick = () => {
                currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('theme', currentTheme);
                applyTheme(currentTheme);
            };

            const transSelect = document.getElementById('translation-select');
            transSelect.value = currentTranslationFile;
            transSelect.addEventListener('change', async (e) => {
                currentTranslationFile = e.target.value; localStorage.setItem('translationFile', currentTranslationFile);
                document.getElementById('surah-list').innerHTML = '';
                document.getElementById('loading').classList.remove('hidden'); document.getElementById('loading').innerText = "Loading new translation...";
                await loadQuran();
            });

            const audioToggle = document.getElementById('audio-advance-toggle');
            audioToggle.checked = autoAdvanceAudio;
            audioToggle.addEventListener('change', (e) => {
                autoAdvanceAudio = e.target.checked;
                localStorage.setItem('autoAdvanceAudio', autoAdvanceAudio);

                isAutoScrolling = false;
                document.getElementById('global-autoscroll-btn').classList.remove('active');
                document.getElementById('global-autoscroll-btn').classList.toggle('hidden', autoAdvanceAudio);
                clearTimeout(autoScrollTimer);
            });

            const speedSlider = document.getElementById('scroll-speed-slider');
            const speedValDisplay = document.getElementById('speed-val');
            speedSlider.value = autoScrollSpeed;
            speedValDisplay.innerText = autoScrollSpeed;
            speedSlider.addEventListener('input', (e) => {
                autoScrollSpeed = e.target.value;
                speedValDisplay.innerText = autoScrollSpeed;
                localStorage.setItem('autoScrollSpeed', autoScrollSpeed);
            });
        }

        // --- Scrubbing Engine ---
        function initScrubbing(feed) {
            const track = document.getElementById('progress-track');
            let isScrubbing = false;

            const handleScrub = (e) => {
                if (!isScrubbing) return;
                const rect = track.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let percentage = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                feed.scrollTop = percentage * (feed.scrollHeight - feed.clientHeight);
            };

            const startScrub = (e) => { isScrubbing = true; feed.style.scrollBehavior = 'auto'; handleScrub(e); };
            const stopScrub = () => { if (isScrubbing) { isScrubbing = false; feed.style.scrollBehavior = 'smooth'; feed.scrollBy(0, 0); } };

            track.addEventListener('mousedown', startScrub);
            window.addEventListener('mousemove', handleScrub);
            window.addEventListener('mouseup', stopScrub);

            track.addEventListener('touchstart', startScrub, { passive: true });
            track.addEventListener('touchmove', handleScrub, { passive: true });
            track.addEventListener('touchend', stopScrub);
        }

        const updateProgressBar = () => {
            const feed = document.getElementById('feed-container');
            const pb = document.getElementById('progress-bar');
            if (feed && pb) pb.style.width = `${(feed.scrollTop / (feed.scrollHeight - feed.clientHeight || 1)) * 100}%`;
        };

        // --- Audio Engine ---
        function getAudioUrl(surah, verse) {
            return `https://everyayah.com/data/Alafasy_128kbps/${String(surah).padStart(3, '0')}${String(verse).padStart(3, '0')}.mp3`;
        }

        function stopAudio() {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
            if (currentlyPlayingBtn) { currentlyPlayingBtn.innerHTML = SVG_PLAY; currentlyPlayingBtn.classList.remove('playing'); currentlyPlayingBtn = null; }
        }

        function playAudio(surah, verse, btn) {
            if (currentlyPlayingBtn === btn) return stopAudio();
            stopAudio();

            isAutoScrolling = false;
            clearTimeout(autoScrollTimer);
            document.getElementById('global-autoscroll-btn').classList.remove('active');

            currentAudio = new Audio(getAudioUrl(surah, verse));
            currentAudio.play();
            currentlyPlayingBtn = btn;
            btn.innerHTML = SVG_PAUSE; btn.classList.add('playing');

            currentAudio.onended = () => {
                stopAudio();
                if (autoAdvanceAudio) {
                    shouldAutoPlayNext = true;
                    document.getElementById('feed-container').scrollBy(0, window.innerHeight);
                }
            };
        }

        // --- UI Navigation ---
        function displaySettings() {
            stopAudio();
            document.title = "Settings - The Qur'an"; // ADD THIS LINE
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('surah-view').classList.add('hidden');
            document.getElementById('settings-view').classList.remove('hidden');
        }

        function displayHome() {
            stopAudio();
            isAutoScrolling = false;
            clearTimeout(autoScrollTimer);
            document.title = "The Qur'an"; // ADD THIS LINE
            document.getElementById('global-autoscroll-btn').classList.remove('active');
            document.getElementById('surah-view').classList.add('hidden');
            document.getElementById('settings-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
            if (currentVerseObserver) currentVerseObserver.disconnect();

        document.getElementById('open-settings-btn').onclick = () => { history.pushState({ view: 'settings' }, '', '#settings'); displaySettings(); };
        document.getElementById('close-settings-btn').onclick = () => { history.pushState({ view: 'home' }, '', window.location.pathname); displayHome(); };
        document.getElementById('prev-surah-btn').onclick = () => openSurah(currentSurahIndex - 1);
        document.getElementById('home-btn').onclick = () => { history.pushState({ view: 'home' }, '', ' '); displayHome(); };
        document.getElementById('next-surah-btn').onclick = () => openSurah(currentSurahIndex + 1);

        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.view === 'surah') displaySurah(e.state.index, e.state.targetVerse);
            else if (e.state && e.state.view === 'settings') displaySettings();
            else displayHome();
        });

        // --- Data Loading & Rendering ---
        async function loadQuran() {
            try {
                const response = await fetch(currentTranslationFile);
                if (!response.ok) throw new Error("File not found");
                quranData = new DOMParser().parseFromString(await response.text(), "text/xml");
                document.getElementById('loading').classList.add('hidden');
                renderSurahList();
            } catch (e) { document.getElementById('loading').innerText = `Error loading ${currentTranslationFile}.`; }
        }

        function renderSurahList() {
            const list = document.getElementById('surah-list'); list.innerHTML = '';
            quranData.querySelectorAll('sura').forEach(sura => {
                const index = parseInt(sura.getAttribute('index')); const meta = SURAH_META[index - 1];
                const li = document.createElement('li'); li.className = 'surah-item';
                li.innerHTML = `<div class="surah-item-info"><span class="surah-name">${index}. ${meta.name}</span><span class="surah-translation">${meta.translation}</span></div><span style="opacity: 0.3;">›</span>`;
                li.onclick = () => openSurah(index); list.appendChild(li);
            });
        }

        function openSurah(index, targetVerse = null) {
            history.pushState({ view: 'surah', index: index, targetVerse: targetVerse }, '', `#surah-${index}`);
            displaySurah(index, targetVerse);
        }

        function displaySurah(index, targetVerse = null) {
            stopAudio();
            isAutoScrolling = false;
            globalActiveVerse = null;
            clearTimeout(autoScrollTimer);

            const autoScrollBtn = document.getElementById('global-autoscroll-btn');
            autoScrollBtn.classList.remove('active');
            autoScrollBtn.classList.toggle('hidden', autoAdvanceAudio);

            currentSurahIndex = parseInt(index);
            const suraNode = quranData.querySelector(`sura[index="${index}"]`);
            if (!suraNode) return displayHome();

            const feed = document.getElementById('feed-container');
            document.getElementById('prev-surah-btn').classList.toggle('invisible', currentSurahIndex <= 1);
            document.getElementById('next-surah-btn').classList.toggle('invisible', currentSurahIndex >= 114);

            if (currentVerseObserver) currentVerseObserver.disconnect();

            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('settings-view').classList.add('hidden');
            document.getElementById('surah-view').classList.remove('hidden');

            feed.style.scrollBehavior = 'auto';
            feed.innerHTML = '';
            feed.scrollTo(0, 0);
            document.getElementById('progress-bar').style.width = '0%';

            feed.classList.remove('fade-in');
            void feed.offsetWidth;
            feed.classList.add('fade-in');

            const meta = SURAH_META[currentSurahIndex - 1];
            document.title = `Surah ${meta.name}`;
            document.getElementById('persistent-chapter-title').innerText = meta.name;
            document.getElementById('persistent-verse-number').innerText = ``;

            if (currentSurahIndex > 1 && currentSurahIndex !== 9) {
                const bismillahNode = quranData.querySelector('sura[index="1"] aya[index="1"]');
                const bText = bismillahNode ? bismillahNode.getAttribute('text') : "In the name of God, the Gracious, the Merciful.";
                const bScreen = document.createElement('div'); bScreen.className = 'verse-screen'; bScreen.dataset.verse = 'bismillah';
                bScreen.innerHTML = `<div class="verse-text">${bText}</div><div class="verse-actions"><button class="icon-btn play-btn" aria-label="Play Audio">${SVG_PLAY}</button></div>`;
                bScreen.querySelector('.play-btn').onclick = function () { playAudio(1, 1, this); };
                feed.appendChild(bScreen);
            }

            suraNode.querySelectorAll('aya').forEach(aya => {
                const text = aya.getAttribute('text'), verseIndex = aya.getAttribute('index');
                const screen = document.createElement('div'); screen.className = 'verse-screen'; screen.dataset.verse = verseIndex;
                let tClass = text.length > 700 ? 'extra-long-verse' : (text.length > 350 ? 'long-verse' : '');
                if (text.length > 700) screen.style.justifyContent = 'flex-start';

                const isSaved = bookmarks.some(b => b.surah == index && b.verse == verseIndex);
                screen.innerHTML = `
                    <div class="verse-text ${tClass}">${text}</div>
                    <div class="verse-actions">
                        <button class="icon-btn bookmark-btn ${isSaved ? 'active' : ''}" aria-label="Bookmark">${SVG_BOOKMARK}</button>
                        <button class="icon-btn play-btn" aria-label="Play Audio">${SVG_PLAY}</button>
                    </div>`;

                const bmBtn = screen.querySelector('.bookmark-btn'); bmBtn.onclick = () => toggleBookmark(index, verseIndex, meta.name, bmBtn);
                const plBtn = screen.querySelector('.play-btn'); plBtn.onclick = () => playAudio(index, verseIndex, plBtn);
                feed.appendChild(screen);
            });

            currentVerseObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const newActiveVerse = entry.target.dataset.verse;
                        if (globalActiveVerse !== newActiveVerse) {
                            globalActiveVerse = newActiveVerse;
                            stopAudio();
                        }

                        document.getElementById('persistent-verse-number').innerText = newActiveVerse === 'bismillah' ? "Bismillah" : `V. ${index}:${newActiveVerse}`;

                        if (shouldAutoPlayNext) {
                            shouldAutoPlayNext = false;
                            const playBtn = entry.target.querySelector('.play-btn');
                            if (playBtn) setTimeout(() => playBtn.click(), 300);
                        }

                        if (isAutoScrolling && !autoAdvanceAudio) triggerAutoScroll(entry.target);
                    }
                });
            }, { root: feed, rootMargin: '0px', threshold: 0.5 });

            feed.querySelectorAll('.verse-screen').forEach(screen => currentVerseObserver.observe(screen));

            setTimeout(() => {
                if (targetVerse) {
                    const targetEl = feed.querySelector(`[data-verse="${targetVerse}"]`);
                    if (targetEl) feed.scrollTop = targetEl.offsetTop;
                }
                feed.style.scrollBehavior = 'smooth';
                updateProgressBar();
            }, 50);
        }

        function triggerAutoScroll(screenEl) {
            clearTimeout(autoScrollTimer);
            if (!screenEl) return;
            const textEl = screenEl.querySelector('.verse-text');
            const words = textEl.innerText.split(/\s+/).length;
            autoScrollTimer = setTimeout(() => {
                if (isAutoScrolling) document.getElementById('feed-container').scrollBy(0, window.innerHeight);
            }, words * autoScrollSpeed);
        }

        // --- Bookmarks Logic ---
        function renderBookmarks() {
            const list = document.getElementById('bookmarks-list'); list.innerHTML = '';
            if (bookmarks.length === 0) return list.innerHTML = `<p style="color: var(--text-muted); font-size: 0.9rem; text-align: center;">No bookmarks saved yet.</p>`;
            bookmarks.sort((a, b) => a.surah - b.surah || parseInt(a.verse) - parseInt(b.verse));
            bookmarks.forEach((bm) => {
                const li = document.createElement('li'); li.className = 'bookmark-item';
                li.innerHTML = `<div class="bookmark-info"><span class="bookmark-title">Surah ${bm.name}</span><span class="bookmark-snippet">Verse ${bm.verse}</span></div>
                                <button class="bookmark-delete" aria-label="Delete"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>`;
                li.querySelector('.bookmark-info').onclick = () => openSurah(bm.surah, bm.verse);
                li.querySelector('.bookmark-delete').onclick = (e) => { e.stopPropagation(); toggleBookmark(bm.surah, bm.verse, bm.name, null); };
                list.appendChild(li);
            });
        }

        function toggleBookmark(sIdx, vIdx, name, btnEl) {
            const exists = bookmarks.findIndex(b => b.surah == sIdx && b.verse == vIdx);
            if (exists > -1) {
                bookmarks.splice(exists, 1);
                if (btnEl) btnEl.classList.remove('active');
                showToast("Bookmark Removed");
            }
            else {
                bookmarks.push({ surah: sIdx, verse: vIdx, name: name });
                if (btnEl) btnEl.classList.add('active');
                showToast("Bookmark Added");
            }
            localStorage.setItem('quran_bookmarks', JSON.stringify(bookmarks)); renderBookmarks();
        }
    </script>
</body>

</html>
