<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#222222">
    <title>Quran - English Translation</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #222222;
            color: #f5f5f5;
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* --- Landing Page --- */
        #home-view {
            height: 100vh;
            width: 100vw;
            overflow-y: auto;
            padding: 2rem 1.5rem;
        }

        .header-title {
            text-align: center;
            margin-bottom: 2rem;
            color: #4CAF50;
            letter-spacing: 1px;
        }

        #surah-list {
            list-style: none;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 4rem;
        }

        .surah-item {
            padding: 1.2rem;
            border-bottom: 1px solid #333;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            transition: background 0.2s;
        }

        .surah-item:hover {
            background-color: #222;
        }

        /* --- Swiping Feed View --- */
        #surah-view {
            position: relative;
            height: 100vh;
            width: 100vw;
        }

        /* Unified Top Navigation Controls */
        .controls {
            position: absolute;
            top: 1rem;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 1rem;
            z-index: 100;
        }

        .nav-btn {
            background: rgba(40, 40, 40, 0.7);
            color: white;
            border: 1px solid #444;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-btn:hover {
            background: rgba(76, 175, 80, 0.8);
            border-color: #4CAF50;
        }

        .right-control {
            margin-left: auto;
        }

        /* Top Bar Background */
        .top-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 1rem;
            background: rgba(18, 18, 18, 0);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
        }

        .nav-left,
        .nav-right {
            flex: 1;
            display: flex;
        }

        .nav-right {
            justify-content: flex-end;
        }

        /* Persistent Chapter Title */
        .persistent-title {
            flex: 2;
            text-align: center;
            font-size: 0.9rem;
            color: #ccc;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            pointer-events: none;
        }

        .feed-container {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .feed-container::-webkit-scrollbar {
            display: none;
        }

        .verse-screen {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem 1.5rem 1rem 1.5rem;
            text-align: center;
            position: relative;
        }

        .verse-number {
            font-size: 1.1rem;
            color: #4CAF50;
            margin-bottom: 1rem;
        }

        .verse-text {
            font-size: 2rem;
            line-height: 1.4;
            max-width: 850px;
            text-wrap: balance;
        }

        @media (max-width: 600px) {
            .verse-text {
                font-size: 1.3rem;
            }

            .nav-btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }

            .persistent-title {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <div id="home-view">
        <h1 class="header-title">The Quran</h1>
        <div id="loading" style="text-align: center; color: #888;">Loading verses...</div>
        <ul id="surah-list"></ul>
    </div>

    <div id="surah-view" class="hidden">
        <div class="top-nav">
            <div class="nav-left">
                <button class="nav-btn" id="back-btn">← List</button>
            </div>

            <div id="persistent-chapter-title" class="persistent-title"></div>

            <div class="nav-right">
                <button class="nav-btn" id="next-surah-btn">Next →</button>
            </div>
        </div>

        <div class="feed-container" id="feed-container"></div>
    </div>

    <script>
        let quranData = null;
        let currentSurahIndex = 1;

        // Listen for Browser Back/Forward buttons
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.view === 'surah') {
                displaySurah(e.state.index);
            } else {
                displayHome();
            }
        });

        // Initialize App
        window.onload = async () => {
            await loadQuran();

            // Check if there is a hash in the URL on direct load (e.g. #surah-2)
            const hash = window.location.hash;
            if (hash.startsWith('#surah-')) {
                const idx = hash.replace('#surah-', '');
                history.replaceState({ view: 'surah', index: idx }, '', hash);
                displaySurah(idx);
            } else {
                // Initialize default history state
                history.replaceState({ view: 'home' }, '', window.location.pathname);
                displayHome();
            }
        };

        async function loadQuran() {
            try {
                const response = await fetch('en.itani.xml');
                const xmlText = await response.text();
                const parser = new DOMParser();
                quranData = parser.parseFromString(xmlText, "text/xml");
                document.getElementById('loading').classList.add('hidden');
                renderSurahList();
            } catch (e) {
                document.getElementById('loading').innerText = "Error loading XML.";
            }
        }

        function renderSurahList() {
            const list = document.getElementById('surah-list');
            const surahs = quranData.querySelectorAll('sura');
            surahs.forEach(sura => {
                const index = sura.getAttribute('index');
                const name = sura.getAttribute('name');

                const li = document.createElement('li');
                li.className = 'surah-item';
                li.innerHTML = `<span>${index}. ${name}</span> <span class="arrow">›</span>`;

                li.onclick = () => openSurah(index);
                list.appendChild(li);
            });
        }

        // Called when a user specifically clicks to go to a Surah
        function openSurah(index) {
            // Push the new state to browser history
            history.pushState({ view: 'surah', index: index }, '', `#surah-${index}`);
            displaySurah(index);
        }

        // Handles the DOM updates for returning to the main list
        function displayHome() {
            document.getElementById('surah-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('feed-container').innerHTML = '';
            document.title = "Quran - English Translation";
        }

        // Handles the DOM updates for showing a specific Surah
        function displaySurah(index) {
            currentSurahIndex = parseInt(index);
            const suraNode = quranData.querySelector(`sura[index="${index}"]`);
            if (!suraNode) return displayHome(); // Fallback if invalid ID

            const feed = document.getElementById('feed-container');
            const nextBtn = document.getElementById('next-surah-btn');

            nextBtn.classList.toggle('hidden', currentSurahIndex >= 114);

            feed.style.scrollBehavior = 'auto';
            feed.scrollTop = 0;
            feed.innerHTML = '';

            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('surah-view').classList.remove('hidden');

            const name = suraNode.getAttribute('name');
            document.title = `Surah ${name || index} - Quran`;
            document.getElementById('persistent-chapter-title').innerText = `Surah ${name || index}`;

            const ayahs = suraNode.querySelectorAll('aya');
            ayahs.forEach(aya => {
                const screen = document.createElement('div');
                screen.className = 'verse-screen';
                screen.innerHTML = `
                    <div class="verse-number">Verse ${index}:${aya.getAttribute('index')}</div>
                    <div class="verse-text">${aya.getAttribute('text')}</div>
                `;
                feed.appendChild(screen);
            });

            feed.scrollTop = 0;
            setTimeout(() => { feed.style.scrollBehavior = 'smooth'; }, 50);
        }

        // UI Buttons
        document.getElementById('back-btn').onclick = () => {
            // Explicitly push home state and display it when clicking the UI button
            history.pushState({ view: 'home' }, '', window.location.pathname);
            displayHome();
        };

        document.getElementById('next-surah-btn').onclick = () => {
            if (currentSurahIndex < 114) {
                openSurah(currentSurahIndex + 1);
            }
        };

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('surah-view').classList.contains('hidden')) {
                const container = document.getElementById('feed-container');
                if (e.key === 'ArrowDown') container.scrollBy(0, window.innerHeight);
                if (e.key === 'ArrowUp') container.scrollBy(0, -window.innerHeight);
            }
        });
    </script>
</body>

</html>
