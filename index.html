<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran - English Translation</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #f5f5f5;
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* --- Landing Page --- */
        #home-view {
            height: 100vh;
            width: 100vw;
            overflow-y: auto;
            padding: 2rem 1rem;
        }

        .header-title {
            text-align: center;
            margin-bottom: 2rem;
            color: #4CAF50;
            letter-spacing: 1px;
        }

        #surah-list {
            list-style: none;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 4rem;
        }

        .surah-item {
            padding: 1.2rem;
            border-bottom: 1px solid #333;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            transition: background 0.2s;
        }

        .surah-item:hover {
            background-color: #222;
        }

        /* --- Swiping Feed View --- */
        #surah-view {
            position: relative;
            height: 100vh;
            width: 100vw;
        }

        /* Top Navigation Controls - Moved to span the width */
        .controls {
            position: absolute;
            top: 1rem;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            /* This pushes one left and one right */
            padding: 0 1rem;
            z-index: 100;
        }

        .nav-btn {
            background: rgba(40, 40, 40, 0.7);
            color: white;
            border: 1px solid #444;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-btn:hover {
            background: rgba(76, 175, 80, 0.8);
            border-color: #4CAF50;
        }

        /* Container for the Next button to keep alignment if Back is hidden */
        .right-control {
            margin-left: auto;
        }

        .feed-container {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .feed-container::-webkit-scrollbar {
            display: none;
        }

        .verse-screen {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem;
            text-align: center;
            position: relative;
        }

        .chapter-title {
            position: absolute;
            top: 5rem;
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .verse-number {
            font-size: 1.1rem;
            color: #4CAF50;
            margin-bottom: 1rem;
        }

        .verse-text {
            font-size: 2rem;
            line-height: 1.4;
            max-width: 850px;
            text-wrap: balance;
        }

        @media (max-width: 600px) {
            .verse-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div id="home-view">
        <h1 class="header-title">The Quran</h1>
        <div id="loading" style="text-align: center; color: #888;">Loading verses...</div>
        <ul id="surah-list"></ul>
    </div>

    <div id="surah-view" class="hidden">
        <div class="controls">
            <button class="nav-btn" id="back-btn">← List</button>
            <div class="right-control">
                <button class="nav-btn" id="next-surah-btn">Next Surah →</button>
            </div>
        </div>
        <div class="feed-container" id="feed-container"></div>
    </div>

    <script>
        let quranData = null;
        let currentSurahIndex = 1;

        async function loadQuran() {
            try {
                const response = await fetch('en.itani.xml');
                const xmlText = await response.text();
                const parser = new DOMParser();
                quranData = parser.parseFromString(xmlText, "text/xml");
                document.getElementById('loading').classList.add('hidden');
                renderSurahList();
            } catch (e) {
                document.getElementById('loading').innerText = "Error loading XML.";
            }
        }

        function renderSurahList() {
            const list = document.getElementById('surah-list');
            const surahs = quranData.querySelectorAll('sura');
            surahs.forEach(sura => {
                const index = sura.getAttribute('index');
                const name = sura.getAttribute('name');

                const li = document.createElement('li');
                li.className = 'surah-item';
                li.innerHTML = `<span>${index}. Surah ${name}</span> <span class="arrow">›</span>`;

                li.onclick = () => openSurah(index);
                list.appendChild(li);
            });
        }

        function openSurah(index) {
            currentSurahIndex = parseInt(index);
            const suraNode = quranData.querySelector(`sura[index="${index}"]`);
            const feed = document.getElementById('feed-container');
            const nextBtn = document.getElementById('next-surah-btn');

            // Hide the Next button if at the last surah (114)
            nextBtn.classList.toggle('hidden', currentSurahIndex >= 114);

            feed.style.scrollBehavior = 'auto';
            feed.scrollTop = 0;
            feed.innerHTML = '';

            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('surah-view').classList.remove('hidden');

            const name = suraNode.getAttribute('name');
            const ayahs = suraNode.querySelectorAll('aya');
            ayahs.forEach(aya => {
                const screen = document.createElement('div');
                screen.className = 'verse-screen';
                screen.innerHTML = `
                    <div class="chapter-title">Surah ${name}</div>
                    <div class="verse-number">Verse ${aya.getAttribute('index')}</div>
                    <div class="verse-text">${aya.getAttribute('text')}</div>
                `;
                feed.appendChild(screen);
            });

            // Reset scroll position to the top of the feed
            feed.scrollTop = 0;
            setTimeout(() => {
                feed.style.scrollBehavior = 'smooth';
            }, 50);
        }

        document.getElementById('back-btn').onclick = () => {
            document.getElementById('surah-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('feed-container').innerHTML = '';
        };

        document.getElementById('next-surah-btn').onclick = () => {
            if (currentSurahIndex < 114) {
                openSurah(currentSurahIndex + 1);
            }
        };

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('surah-view').classList.contains('hidden')) {
                const container = document.getElementById('feed-container');
                if (e.key === 'ArrowDown') container.scrollBy(0, window.innerHeight);
                if (e.key === 'ArrowUp') container.scrollBy(0, -window.innerHeight);
            }
        });

        window.onload = loadQuran;
    </script>
</body>

</html>
