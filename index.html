<!DOCTYPE html>
<html lang="en" data-arabic-font="default">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" id="theme-color-meta" content="#fcfaf7">
    <meta name="version" content="6.2">
    <title>The Qur'an</title>
    <style>
        /* --- CSS variables and themes remain unchanged --- */
        :root {
            --bg-base: #fcfaf7;
            --bg-gradient: linear-gradient(180deg, #fdfbf7 0%, #f1f2f6 100%);
            --text-main: #2d3436;
            --text-muted: #57606f;
            --card-bg: #ffffff;
            --card-border: rgba(0, 0, 0, 0.02);
            --card-shadow: rgba(0, 0, 0, 0.03);
            --accent-primary: #e67e22;
            --accent-secondary: #3498db;
            --nav-bg: rgba(255, 255, 255, 0.4);
            --nav-border: rgba(0, 0, 0, 0.05);
            --hover-highlight: rgba(230, 126, 34, 0.1);
            --progress-bg: rgba(0, 0, 0, 0.05);
            --danger: #e74c3c;
        }

        [data-theme="dark"] {
            --bg-base: #0f172a;
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --card-border: rgba(255, 255, 255, 0.05);
            --card-shadow: rgba(0, 0, 0, 0.4);
            --accent-primary: #fbbf24;
            --accent-secondary: #22d3ee;
            --nav-bg: rgba(15, 23, 42, 0.5);
            --nav-border: rgba(255, 255, 255, 0.1);
            --hover-highlight: rgba(251, 191, 36, 0.15);
            --progress-bg: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
        }

        @font-face {
            font-family: 'UthmanicHafs';
            src: url('https://verses.quran.foundation/fonts/quran/hafs/uthmanic_hafs/UthmanicHafs1Ver18.woff2') format('woff2'),
                url('https://verses.quran.foundation/fonts/quran/hafs/uthmanic_hafs/UthmanicHafs1Ver18.ttf') format('truetype');
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100dvh;
            font-family: 'Georgia', serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        .invisible {
            visibility: hidden !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* --- Landing Page --- */
        #home-view {
            height: 100dvh;
            width: 100vw;
            overflow-y: auto;
            padding: 2rem 1.5rem 1rem 1.5rem;
            background: var(--bg-gradient);
            position: relative;
        }

        .home-header {
            display: grid;
            grid-template-columns: 45px 1fr 45px;
            align-items: center;
            margin-top: 1rem;
            margin-bottom: 3rem;
            width: 100%;
            max-width: 600px;
            margin-inline: auto;
        }

        .header-title {
            grid-column: 2;
            text-align: center;
            margin: 0;
            color: var(--accent-primary);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.8rem;
            font-weight: 300;
        }

        .header-actions {
            grid-column: 3;
            display: flex;
            justify-content: flex-end;
        }

        .icon-btn,
        .pill-btn,
        .header-icon-btn,
        .nav-icon-btn {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .icon-btn {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--nav-border);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px var(--card-shadow);
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            border-color: var(--accent-secondary);
            transform: scale(1.05);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .icon-btn.active {
            color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .icon-btn.active svg {
            fill: currentColor;
        }

        #surah-list {
            list-style: none;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 3rem;
        }

        .surah-item {
            padding: 1.2rem 1.5rem;
            margin-bottom: 0.8rem;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--card-shadow);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            transition: 0.2s;
        }

        .surah-item-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .surah-name {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .surah-translation {
            font-size: 0.85rem;
            font-family: sans-serif;
            opacity: 0.8;
        }

        .surah-item:hover {
            background-color: var(--hover-highlight);
            transform: scale(1.02);
        }

        .surah-item:hover .surah-name {
            color: var(--accent-primary);
        }

        /* --- Settings View --- */
        #settings-view {
            height: 100dvh;
            width: 100vw;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            background: var(--bg-gradient);
        }

        .settings-container {
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 4rem;
        }

        .settings-header {
            display: flex;
            align-items: center;
            margin-bottom: 3rem;
            gap: 1.5rem;
        }

        .settings-header h2 {
            color: var(--accent-primary);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .settings-back-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: sans-serif;
            font-weight: bold;
        }

        .settings-back-btn svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .setting-group {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px var(--card-shadow);
        }

        .setting-group label {
            display: block;
            margin-bottom: 1rem;
            font-weight: bold;
            color: var(--text-main);
            font-family: sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .setting-text {
            font-size: 0.95rem;
            font-family: sans-serif;
            color: var(--text-main);
        }

        .top-control {
            background: var(--bg-base);
            color: var(--text-main);
            border: 1px solid var(--nav-border);
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            width: 100%;
            outline: none;
            transition: all 0.2s ease;
        }

        .top-control:hover {
            border-color: var(--accent-secondary);
        }

        .bookmarks-list {
            list-style: none;
            margin-top: 1rem;
        }

        .bookmark-item {
            background: var(--bg-base);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .bookmark-item:hover {
            border-color: var(--accent-secondary);
        }

        .bookmark-info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .bookmark-title {
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
        }

        .bookmark-snippet {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .bookmark-delete {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 5px;
        }

        .bookmark-delete:hover {
            background: rgba(231, 76, 60, 0.1);
        }

        .bookmark-delete svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* --- Header Assembly --- */
        .header-assembly {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--nav-border);
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.5rem;
            height: 60px;
        }

        .persistent-title {
            font-size: 0.9rem;
            color: var(--accent-primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            transition: all 0.3s;
        }

        .persistent-title.arabic-mode {
            font-family: 'Amiri', serif;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0;
        }

        .persistent-verse {
            font-size: 0.8rem;
            color: var(--accent-secondary);
            font-family: sans-serif;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .tabs-bar {
            display: flex;
            height: 45px;
            width: 100%;
        }

        .tab-btn {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--accent-primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background: var(--accent-primary);
            border-radius: 3px 3px 0 0;
        }

        .header-icon-btn {
            flex: 0 0 55px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-left: 1px solid var(--nav-border);
            transition: all 0.2s ease;
        }

        .header-icon-btn:hover {
            color: var(--accent-secondary);
            background: var(--hover-highlight);
        }

        .header-icon-btn.active {
            color: var(--accent-primary);
        }

        .header-icon-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* --- Bottom Bar Assembly --- */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--nav-border);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .progress-hit-area {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 20px;
            cursor: pointer;
            z-index: 101;
            display: flex;
            align-items: center;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: var(--progress-bg);
            pointer-events: none;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-secondary);
            box-shadow: 0 0 10px var(--accent-secondary);
            transition: width 0.1s linear;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.5rem 1.5rem;
            padding-bottom: calc(0.8rem + env(safe-area-inset-bottom, 0px));
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .nav-icon-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .nav-icon-btn:hover {
            background: var(--hover-highlight);
            color: var(--accent-secondary);
        }

        .nav-icon-btn svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #home-btn {
            color: var(--accent-primary);
        }

        #home-btn:hover {
            background: rgba(230, 126, 34, 0.1);
        }

        /* --- Nested Carousel System --- */
        #surah-view {
            position: relative;
            height: 100dvh;
            width: 100vw;
        }

        .tab-carousel {
            width: 100vw;
            height: 100dvh;
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            touch-action: pan-x pan-y;
        }

        .tab-carousel::-webkit-scrollbar {
            display: none;
        }

        .vertical-feed {
            flex: 0 0 100vw;
            width: 100vw;
            height: 100dvh;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            scrollbar-width: none;
        }

        .vertical-feed::-webkit-scrollbar {
            display: none;
        }

        .verse-screen {
            width: 100vw;
            height: 100dvh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 9rem 2rem 8rem 2rem;
            text-align: center;
            position: relative;
        }

        .verse-actions {
            position: absolute;
            bottom: calc(85px + env(safe-area-inset-bottom, 0px));
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .vertical-feed.is-scrolling .verse-actions {
            opacity: 0.3;
            pointer-events: none;
        }

        .bookmark-btn:not(.active) svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linejoin: round;
            stroke-linecap: round;
        }

        .play-pill {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--nav-border);
            border-radius: 25px;
            box-shadow: 0 4px 10px var(--card-shadow);
            overflow: hidden;
        }

        .pill-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pill-btn:hover {
            background: var(--hover-highlight);
            color: var(--accent-secondary);
        }

        .pill-btn.active {
            color: var(--accent-primary);
        }

        .pill-btn.playing {
            color: var(--accent-secondary);
        }

        .pill-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .pill-divider {
            width: 1px;
            height: 24px;
            background: var(--nav-border);
        }

        .verse-text {
            font-size: 2rem;
            line-height: 1.6;
            max-width: 800px;
            text-wrap: balance;
            color: var(--text-main);
        }

        .verse-text.long-verse {
            font-size: 1.4rem;
        }

        .verse-text.extra-long-verse {
            font-size: 1.1rem;
        }

        .verse-text-arabic {
            direction: rtl;
            text-align: center;
            max-width: 900px;
        }

        [data-arabic-font="uthmanic"] .verse-text-arabic {
            font-family: 'UthmanicHafs', serif;
            font-size: 2.8rem;
            line-height: 1.8;
        }

        [data-arabic-font="default"] .verse-text-arabic {
            font-family: 'Amiri', 'Scheherazade New', sans-serif;
            font-size: 2.3rem;
            line-height: 1.6;
        }

        [data-arabic-font="uthmanic"] .verse-text-arabic.long-verse {
            font-size: 1.8rem;
        }

        [data-arabic-font="default"] .verse-text-arabic.long-verse {
            font-size: 1.6rem;
        }

        .swipe-hint {
            position: fixed;
            bottom: calc(80px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--nav-border);
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            z-index: 90;
            pointer-events: none;
            box-shadow: 0 4px 15px var(--card-shadow);
            animation: bounceUp 1.5s infinite;
            transition: opacity 0.3s ease;
        }

        .swipe-hint.fade-out {
            opacity: 0;
        }

        .swipe-hint svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes bounceUp {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(-8px);
            }
        }

        #toast-container {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text-main);
            color: var(--bg-base);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-family: sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

        #toast-container.show {
            opacity: 0.95;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            .verse-text {
                font-size: 1.5rem;
            }

            .verse-text.long-verse {
                font-size: 1.2rem;
            }

            .verse-text.extra-long-verse {
                font-size: 1.05rem;
            }

            [data-arabic-font="uthmanic"] .verse-text-arabic {
                font-size: 2.2rem;
            }

            [data-arabic-font="default"] .verse-text-arabic {
                font-size: 1.8rem;
            }

            .verse-actions {
                right: 1rem;
            }

            .icon-btn,
            .pill-btn,
            .nav-icon-btn {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>

    <div id="home-view">
        <div class="home-header">
            <div></div>
            <h1 class="header-title">The Qur'an</h1>
            <div class="header-actions">
                <button id="open-settings-btn" class="icon-btn" aria-label="Settings">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
                    </svg>
                </button>
            </div>
        </div>

    <script>
        // ==========================================
        // 1. DATA & CONSTANTS
        // ==========================================
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

        const SURAH_META = [
            { index: 1, name: "Al-Fatihah", translation: "The Opening" }, { index: 2, name: "Al-Baqarah", translation: "The Cow" }, { index: 3, name: "Ali 'Imran", translation: "Family of Imran" }, { index: 4, name: "An-Nisa'", translation: "The Women" }, { index: 5, name: "Al-Ma'idah", translation: "The Table Spread" }, { index: 6, name: "Al-An'am", translation: "The Cattle" }, { index: 7, name: "Al-A'raf", translation: "The Heights" }, { index: 8, name: "Al-Anfal", translation: "The Spoils of War" }, { index: 9, name: "At-Tawbah", translation: "The Repentance" }, { index: 10, name: "Yunus", translation: "Jonah" }, { index: 11, name: "Hud", translation: "Hud" }, { index: 12, name: "Yusuf", translation: "Joseph" }, { index: 13, name: "Ar-Ra'd", translation: "The Thunder" }, { index: 14, name: "Ibrahim", translation: "Abraham" }, { index: 15, name: "Al-Hijr", translation: "The Rocky Tract" }, { index: 16, name: "An-Nahl", translation: "The Bee" }, { index: 17, name: "Al-Isra'", translation: "The Night Journey" }, { index: 18, name: "Al-Kahf", translation: "The Cave" }, { index: 19, name: "Maryam", translation: "Mary" }, { index: 20, name: "Ta-Ha", translation: "Ta-Ha" }, { index: 21, name: "Al-Anbiya'", translation: "The Prophets" }, { index: 22, name: "Al-Hajj", translation: "The Pilgrimage" }, { index: 23, name: "Al-Mu'minun", translation: "The Believers" }, { index: 24, name: "An-Nur", translation: "The Light" }, { index: 25, name: "Al-Furqan", translation: "The Criterion" }, { index: 26, name: "Ash-Shu'ara'", translation: "The Poets" }, { index: 27, name: "An-Naml", translation: "The Ant" }, { index: 28, name: "Al-Qasas", translation: "The Stories" }, { index: 29, name: "Al-'Ankabut", translation: "The Spider" }, { index: 30, name: "Ar-Rum", translation: "The Romans" }, { index: 31, name: "Luqman", translation: "Luqman" }, { index: 32, name: "As-Sajdah", translation: "The Prostration" }, { index: 33, name: "Al-Ahzab", translation: "The Combined Forces" }, { index: 34, name: "Saba'", translation: "Sheba" }, { index: 35, name: "Fatir", translation: "Originator" }, { index: 36, name: "Ya-Sin", translation: "Ya-Sin" }, { index: 37, name: "As-Saffat", translation: "Those who set the Ranks" }, { index: 38, name: "Sad", translation: "The Letter 'Saad'" }, { index: 39, name: "Az-Zumar", translation: "The Troops" }, { index: 40, name: "Ghafir", translation: "The Forgiver" }, { index: 41, name: "Fussilat", translation: "Explained in Detail" }, { index: 42, name: "Ash-Shura", translation: "The Consultation" }, { index: 43, name: "Az-Zukhruf", translation: "The Ornaments of Gold" }, { index: 44, name: "Ad-Dukhan", translation: "The Smoke" }, { index: 45, name: "Al-Jathiyah", translation: "The Crouching" }, { index: 46, name: "Al-Ahqaf", translation: "The Wind-Curved Sandhills" }, { index: 47, name: "Muhammad", translation: "Muhammad" }, { index: 48, name: "Al-Fath", translation: "The Victory" }, { index: 49, name: "Al-Hujurat", translation: "The Dwellings" }, { index: 50, name: "Qaf", translation: "The Letter 'Qaf'" }, { index: 51, name: "Adh-Dhariyat", translation: "The Winnowing Winds" }, { index: 52, name: "At-Tur", translation: "The Mount" }, { index: 53, name: "An-Najm", translation: "The Star" }, { index: 54, name: "Al-Qamar", translation: "The Moon" }, { index: 55, name: "Ar-Rahman", translation: "The Beneficent" }, { index: 56, name: "Al-Waqi'ah", translation: "The Inevitable" }, { index: 57, name: "Al-Hadid", translation: "The Iron" }, { index: 58, name: "Al-Mujadilah", translation: "The Pleading Woman" }, { index: 59, name: "Al-Hashr", translation: "The Exile" }, { index: 60, name: "Al-Mumtahanah", translation: "She that is to be examined" }, { index: 61, name: "As-Saff", translation: "The Ranks" }, { index: 62, name: "Al-Jumu'ah", translation: "The Congregation, Friday" }, { index: 63, name: "Al-Munafiqun", translation: "The Hypocrites" }, { index: 64, name: "At-Taghabun", translation: "The Mutual Disillusion" }, { index: 65, name: "At-Talaq", translation: "The Divorce" }, { index: 66, name: "At-Tahrim", translation: "The Prohibition" }, { index: 67, name: "Al-Mulk", translation: "The Sovereignty" }, { index: 68, name: "Al-Qalam", translation: "The Pen" }, { index: 69, name: "Al-Haqqah", translation: "The Reality" }, { index: 70, name: "Al-Ma'arij", translation: "The Ascending Stairways" }, { index: 71, name: "Nuh", translation: "Noah" }, { index: 72, name: "Al-Jinn", translation: "The Jinn" }, { index: 73, name: "Al-Muzzammil", translation: "The Enshrouded One" }, { index: 74, name: "Al-Muddaththir", translation: "The Cloaked One" }, { index: 75, name: "Al-Qiyamah", translation: "The Resurrection" }, { index: 76, name: "Al-Insan", translation: "The Man" }, { index: 77, name: "Al-Mursalat", translation: "The Emissaries" }, { index: 78, name: "An-Naba'", translation: "The Tidings" }, { index: 79, name: "An-Nazi'at", translation: "Those who drag forth" }, { index: 80, name: "'Abasa", translation: "He Frowned" }, { index: 81, name: "At-Takwir", translation: "The Overthrowing" }, { index: 82, name: "Al-Infitar", translation: "The Cleaving" }, { index: 83, name: "Al-Mutaffifin", translation: "The Defrauding" }, { index: 84, name: "Al-Inshiqaq", translation: "The Sundering" }, { index: 85, name: "Al-Buruj", translation: "The Mansions of the Stars" }, { index: 86, name: "At-Tariq", translation: "The Night-Comer" }, { index: 87, name: "Al-A'la", translation: "The Most High" }, { index: 88, name: "Al-Ghashiyah", translation: "The Overwhelming" }, { index: 89, name: "Al-Fajr", translation: "The Dawn" }, { index: 90, name: "Al-Balad", translation: "The City" }, { index: 91, name: "Ash-Shams", translation: "The Sun" }, { index: 92, name: "Al-Layl", translation: "The Night" }, { index: 93, name: "Ad-Duha", translation: "The Morning Hours" }, { index: 94, name: "Ash-Sharh", translation: "The Relief" }, { index: 95, name: "At-Tin", translation: "The Fig" }, { index: 96, name: "Al-'Alaq", translation: "The Clot" }, { index: 97, name: "Al-Qadr", translation: "The Power" }, { index: 98, name: "Al-Bayyinah", translation: "The Clear Proof" }, { index: 99, name: "Az-Zalzalah", translation: "The Earthquake" }, { index: 100, name: "Al-'Adiyat", translation: "The Courser" }, { index: 101, name: "Al-Qari'ah", translation: "The Calamity" }, { index: 102, name: "At-Takathur", translation: "The Rivalry in world increase" }, { index: 103, name: "Al-'Asr", translation: "The Declining Day" }, { index: 104, name: "Al-Humazah", translation: "The Traducer" }, { index: 105, name: "Al-Fil", translation: "The Elephant" }, { index: 106, name: "Quraysh", translation: "Quraysh" }, { index: 107, name: "Al-Ma'un", translation: "Small Kindnesses" }, { index: 108, name: "Al-Kawthar", translation: "Abundance" }, { index: 109, name: "Al-Kafirun", translation: "The Disbelievers" }, { index: 110, name: "An-Nasr", translation: "The Divine Support" }, { index: 111, name: "Al-Masad", translation: "The Palm Fiber" }, { index: 112, name: "Al-Ikhlas", translation: "The Sincerity" }, { index: 113, name: "Al-Falaq", translation: "The Daybreak" }, { index: 114, name: "An-Nas", translation: "Mankind" }
        ];

        const ICONS = {
            bookmark: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`,
            play: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>`,
            pause: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`,
            autoplay: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 10h12v2H4zm0-4h12v2H4zm0 8h8v2H4zm10 0v6l5-3z"/></svg>`
        };

        // ==========================================
        // 2. STATE MANAGEMENT
        // ==========================================
        const AppState = {
            // Data
            quranXML: null,
            arabicXML: null,
            translationFile: localStorage.getItem('translationFile') || 'en.itani.xml',
            reciterPath: localStorage.getItem('reciterPath') || 'Alafasy_128kbps',
            bookmarks: JSON.parse(localStorage.getItem('quran_bookmarks')) || [],

            // Reading Context
            currentSurahIndex: 1,
            currentArabicSurahName: '',
            currentTab: 'trans',
            activeVerseIndex: null,
            verseObserver: null,

            // Automations
            autoAdvanceAudio: false,
            isAutoScrolling: false,
            autoScrollSpeed: parseInt(localStorage.getItem('autoScrollSpeed')) || 400,
            autoScrollTimer: null,
            shouldAutoPlayNext: false,
            hasSwipedUp: localStorage.getItem('quran_has_swiped') === 'true',

            // Audio Context
            currentAudioObj: null,
            activePlayButton: null
        };

        const DOM = {
            tabCarousel: document.getElementById('tab-carousel'),
            transFeed: document.getElementById('trans-feed'),
            arabicFeed: document.getElementById('arabic-feed')
        };

        const getActiveFeed = () => AppState.currentTab === 'trans' ? DOM.transFeed : DOM.arabicFeed;

        // ==========================================
        // 3. INITIALIZATION & ROUTING
        // ==========================================
        window.onload = async () => {
            initSettings();
            renderBookmarks();
            initHeaderAutomations();
            initScrollingFades();
            initScrubbing();
            initNavTooltips();
            initGestureInterrupts();

            await fetchQuranData();

            const hash = window.location.hash;
            if (hash.startsWith('#surah-')) displaySurah(hash.replace('#surah-', ''));
            else if (hash === '#settings') displaySettings();
            else displayHome();
        };

        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.view === 'surah') displaySurah(e.state.index, e.state.targetVerse);
            else if (e.state && e.state.view === 'settings') displaySettings();
            else displayHome();
        });

        // ==========================================
        // 4. DATA LOADING & RENDERING
        // ==========================================
        async function fetchQuranData() {
            try {
                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('loading').innerText = "Loading library...";

                const [transRes, arabicRes] = await Promise.all([
                    fetch(AppState.translationFile), fetch('quran-simple.xml')
                ]);

                if (!transRes.ok || !arabicRes.ok) throw new Error("Files not found");

                const parser = new DOMParser();
                AppState.quranXML = parser.parseFromString(await transRes.text(), "text/xml");
                AppState.arabicXML = parser.parseFromString(await arabicRes.text(), "text/xml");

                document.getElementById('loading').classList.add('hidden');
                renderLibraryList();
            } catch (e) {
                document.getElementById('loading').innerText = `Error loading library.`;
            }
        }

        function renderLibraryList() {
            const list = document.getElementById('surah-list');
            list.innerHTML = '';
            AppState.quranXML.querySelectorAll('sura').forEach(sura => {
                const index = parseInt(sura.getAttribute('index'));
                const meta = SURAH_META[index - 1];

                const li = document.createElement('li');
                li.className = 'surah-item';
                li.innerHTML = `
                    <div class="surah-item-info">
                        <span class="surah-name">${index}. ${meta.name}</span>
                        <span class="surah-translation">${meta.translation}</span>
                    </div><span style="opacity: 0.3;">›</span>`;
                li.onclick = () => openSurah(index);
                list.appendChild(li);
            });
        }

        // ==========================================
        // 5. VIEW CONTROLLERS (SURAH LOGIC)
        // ==========================================
        function openSurah(index, targetVerse = null) {
            history.pushState({ view: 'surah', index: index, targetVerse: targetVerse }, '', `#surah-${index}`);
            displaySurah(index, targetVerse);
        }

        function displaySurah(index, targetVerse = null) {
            haltAllAutomations();
            resetReadingEnvironment();

            AppState.currentSurahIndex = parseInt(index);
            const transSuraNode = AppState.quranXML.querySelector(`sura[index="${index}"]`);
            const arabicSuraNode = AppState.arabicXML.querySelector(`sura[index="${index}"]`);

            if (!transSuraNode || !arabicSuraNode) return displayHome();

            AppState.currentArabicSurahName = arabicSuraNode.getAttribute('name');
            const meta = SURAH_META[AppState.currentSurahIndex - 1];

            updateNavigationUI(index);
            switchViewTo('surah');
            document.title = `Surah ${meta.name} - The Qur'an`;
            updateTabUI(AppState.currentTab);

            triggerGestureHint();
            renderAllVerses(index, transSuraNode, arabicSuraNode, meta);
            setupScrollSpy(index);

            // Navigate to target or start
            setTimeout(() => {
                if (targetVerse) {
                    const targetElEn = DOM.transFeed.querySelector(`[data-verse="${targetVerse}"]`);
                    const targetElAr = DOM.arabicFeed.querySelector(`[data-verse="${targetVerse}"]`);
                    if (targetElEn && targetElAr) {
                        DOM.transFeed.scrollTo({ top: targetElEn.offsetTop, behavior: 'auto' });
                        DOM.arabicFeed.scrollTo({ top: targetElAr.offsetTop, behavior: 'auto' });
                    }
                }
                const destX = AppState.currentTab === 'arabic' ? window.innerWidth : 0;
                DOM.tabCarousel.scrollTo({ left: destX, top: 0, behavior: 'auto' });

                DOM.transFeed.style.scrollBehavior = 'smooth';
                DOM.arabicFeed.style.scrollBehavior = 'smooth';
                updateProgressBar();
            }, 50);
        }

        function resetReadingEnvironment() {
            if (AppState.verseObserver) AppState.verseObserver.disconnect();
            AppState.activeVerseIndex = null;

            DOM.tabCarousel.scrollTo(0, 0);
            DOM.transFeed.style.scrollBehavior = 'auto';
            DOM.arabicFeed.style.scrollBehavior = 'auto';
            DOM.transFeed.innerHTML = '';
            DOM.arabicFeed.innerHTML = '';
            DOM.transFeed.scrollTo(0, 0);
            DOM.arabicFeed.scrollTo(0, 0);
            document.getElementById('progress-bar').style.width = '0%';

            // Trigger Fade
            DOM.tabCarousel.classList.remove('fade-in');
            void DOM.tabCarousel.offsetWidth;
            DOM.tabCarousel.classList.add('fade-in');
        }

        function renderAllVerses(surahIndex, transNode, arabicNode, meta) {
            // Render Bismillah (if applicable)
            if (surahIndex > 1 && surahIndex !== 9) {
                const firstAyaAr = arabicNode.querySelector('aya[index="1"]');
                const bTextAr = (firstAyaAr && firstAyaAr.getAttribute('bismillah')) ? firstAyaAr.getAttribute('bismillah') : "بِسْمِ اللَّهِ الرَّحْمَـٰنِ الرَّحِيمِ";
                const bTextEn = AppState.quranXML.querySelector('sura[index="1"] aya[index="1"]')?.getAttribute('text') || "In the name of God, the Gracious, the Merciful.";

                DOM.transFeed.appendChild(createVerseDOM(bTextEn, 'bismillah', false, meta.name, surahIndex, false));
                DOM.arabicFeed.appendChild(createVerseDOM(bTextAr, 'bismillah', false, meta.name, surahIndex, true));
            }

            // Render Ayas
            const arabicAyas = Array.from(arabicNode.querySelectorAll('aya'));
            transNode.querySelectorAll('aya').forEach((transAya, i) => {
                const verseIndex = transAya.getAttribute('index');
                const isSaved = AppState.bookmarks.some(b => b.surah == surahIndex && b.verse == verseIndex);
                const arText = arabicAyas[i] ? arabicAyas[i].getAttribute('text') : "Text missing";
                const enText = transAya.getAttribute('text');

                DOM.transFeed.appendChild(createVerseDOM(enText, verseIndex, isSaved, meta.name, surahIndex, false));
                DOM.arabicFeed.appendChild(createVerseDOM(arText, verseIndex, isSaved, meta.name, surahIndex, true));
            });
        }

        function createVerseDOM(text, verseIndex, isSaved, metaName, sIdx, isArabic) {
            const screen = document.createElement('div');
            screen.className = 'verse-screen';
            screen.dataset.verse = verseIndex;

            let tClass = text.length > 700 ? 'extra-long-verse' : (text.length > 350 ? 'long-verse' : '');
            const arClass = isArabic ? 'verse-text-arabic' : '';

            screen.innerHTML = `
                <div class="verse-text ${arClass} ${tClass}">${text}</div>
                <div class="verse-actions">
                    <button class="icon-btn bookmark-btn ${isSaved ? 'active' : ''}" aria-label="Bookmark">${ICONS.bookmark}</button>
                    <div class="play-pill">
                        <button class="pill-btn play-btn" aria-label="Play Audio">${ICONS.play}</button>
                        <div class="pill-divider"></div>
                        <button class="pill-btn autoplay-toggle ${AppState.autoAdvanceAudio ? 'active' : ''}" aria-label="Auto Play">${ICONS.autoplay}</button>
                    </div>
                </div>`;

            const bmBtn = screen.querySelector('.bookmark-btn');
            bmBtn.onclick = () => toggleBookmark(sIdx, verseIndex, metaName, bmBtn);
            addLongPressListener(bmBtn, "Bookmark Verse");

            const plBtn = screen.querySelector('.play-btn');
            plBtn.onclick = () => playAudio(sIdx, verseIndex, plBtn);
            addLongPressListener(plBtn, "Play Verse Audio");

            const autoPlayBtn = screen.querySelector('.autoplay-toggle');
            autoPlayBtn.onclick = () => toggleAutoPlay();
            addLongPressListener(autoPlayBtn, "Toggle Auto-Advance");

            return screen;
        }

        // ==========================================
        // 6. OBSERVERS & SCROLL SYNC
        // ==========================================
        function setupScrollSpy(surahIndex) {
            AppState.verseObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const newVerse = entry.target.dataset.verse;
                        const isVisibleFeed = (AppState.currentTab === 'trans' && entry.target.parentElement.id === 'trans-feed') ||
                            (AppState.currentTab === 'arabic' && entry.target.parentElement.id === 'arabic-feed');

                        if (AppState.activeVerseIndex !== newVerse && isVisibleFeed) {
                            AppState.activeVerseIndex = newVerse;

                            // Update header
                            document.getElementById('persistent-verse-number').innerText = newVerse === 'bismillah' ? "" : `${surahIndex}:${newVerse}`;

                            // Sync background feed
                            const otherFeed = AppState.currentTab === 'trans' ? DOM.arabicFeed : DOM.transFeed;
                            const hiddenScreenTarget = otherFeed.querySelector(`[data-verse="${newVerse}"]`);
                            if (hiddenScreenTarget) {
                                otherFeed.scrollTo({ top: hiddenScreenTarget.offsetTop, behavior: 'auto' });
                            }

                            // Trigger Audio/Scroll chained automations
                            if (AppState.shouldAutoPlayNext) {
                                AppState.shouldAutoPlayNext = false;
                                playAudio(surahIndex, newVerse);
                            }
                            if (AppState.isAutoScrolling && !AppState.autoAdvanceAudio) {
                                triggerAutoScroll();
                            }
                        }
                    }
                });
            }, { rootMargin: '0px', threshold: 0.5 });

            document.querySelectorAll('.verse-screen').forEach(s => AppState.verseObserver.observe(s));
        }

        // ==========================================
        // 7. AUTOMATIONS & GESTURES
        // ==========================================
        function initHeaderAutomations() {
            const autoScrollBtn = document.getElementById('header-autoscroll-btn');
            addLongPressListener(autoScrollBtn, 'Toggle Auto-Scroll');

            autoScrollBtn.onclick = () => {
                AppState.isAutoScrolling = !AppState.isAutoScrolling;
                autoScrollBtn.classList.toggle('active', AppState.isAutoScrolling);

                if (AppState.isAutoScrolling) {
                    if (AppState.autoAdvanceAudio) toggleAutoPlay(false, true);
                    showToast("Auto-scroll Enabled");
                    triggerAutoScroll();
                } else {
                    showToast("Auto-scroll Disabled");
                    clearTimeout(AppState.autoScrollTimer);
                }
            };
        }

        function haltAllAutomations() {
            if (AppState.currentAudioObj || AppState.isAutoScrolling || AppState.autoAdvanceAudio) {
                stopAudio();
                if (AppState.isAutoScrolling) {
                    AppState.isAutoScrolling = false;
                    clearTimeout(AppState.autoScrollTimer);
                    document.getElementById('header-autoscroll-btn').classList.remove('active');
                }
                if (AppState.autoAdvanceAudio) toggleAutoPlay(false, true);
                AppState.shouldAutoPlayNext = false;
            }
        }

        function triggerAutoScroll() {
            clearTimeout(AppState.autoScrollTimer);
            const active = getActiveFeed();
            const activeScreen = active.querySelector(`[data-verse="${AppState.activeVerseIndex}"]`);
            if (!activeScreen) return;

            const words = activeScreen.querySelector('.verse-text').innerText.split(/\s+/).length;

            AppState.autoScrollTimer = setTimeout(() => {
                if (AppState.isAutoScrolling) active.scrollBy({ top: window.innerHeight, behavior: 'smooth' });
            }, words * AppState.autoScrollSpeed);
        }

        function initGestureInterrupts() {
            let startY = 0, startX = 0;

            const recordStart = (e) => { startY = e.touches[0].clientY; startX = e.touches[0].clientX; };
            const checkInterrupt = (e) => {
                if (!AppState.currentAudioObj && !AppState.isAutoScrolling && !AppState.autoAdvanceAudio) return;
                const dY = Math.abs(e.touches[0].clientY - startY);
                const dX = Math.abs(e.touches[0].clientX - startX);
                if (dY > dX && dY > 10) haltAllAutomations();
            };
            const checkWheel = (e) => {
                if (AppState.currentAudioObj || AppState.isAutoScrolling || AppState.autoAdvanceAudio) {
                    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) haltAllAutomations();
                }
            };

            [DOM.transFeed, DOM.arabicFeed].forEach(feed => {
                feed.addEventListener('touchstart', recordStart, { passive: true });
                feed.addEventListener('touchmove', checkInterrupt, { passive: true });
                feed.addEventListener('wheel', checkWheel, { passive: true });
            });
        }

        // ==========================================
        // 8. AUDIO ENGINE
        // ==========================================
        function getAudioUrl(surah, verse) {
            if (verse === 'bismillah') return `https://everyayah.com/data/${AppState.reciterPath}/001001.mp3`;
            return `https://everyayah.com/data/${AppState.reciterPath}/${String(surah).padStart(3, '0')}${String(verse).padStart(3, '0')}.mp3`;
        }

        function stopAudio() {
            if (AppState.currentAudioObj) {
                AppState.currentAudioObj.pause();
                AppState.currentAudioObj.currentTime = 0;
                AppState.currentAudioObj = null;
            }
            document.querySelectorAll('.play-btn.playing').forEach(btn => {
                btn.innerHTML = ICONS.play;
                btn.classList.remove('playing');
            });
            AppState.activePlayButton = null;
        }

        function playAudio(surah, verse, triggeredBtn = null) {
            const targets = document.querySelectorAll(`[data-verse="${verse}"]`);
            const fallbackBtn = targets.length > 0 ? targets[0].querySelector('.play-btn') : null;
            const refBtn = triggeredBtn || fallbackBtn;

            if (AppState.activePlayButton === refBtn && refBtn) return stopAudio();
            stopAudio();

            if (AppState.isAutoScrolling) {
                AppState.isAutoScrolling = false; clearTimeout(AppState.autoScrollTimer);
                document.getElementById('header-autoscroll-btn').classList.remove('active');
            }

            AppState.currentAudioObj = new Audio(getAudioUrl(surah, verse));
            AppState.currentAudioObj.play();

            targets.forEach(screen => {
                const btn = screen.querySelector('.play-btn');
                if (btn) {
                    btn.innerHTML = ICONS.pause; btn.classList.add('playing');
                    if (!AppState.activePlayButton) AppState.activePlayButton = btn;
                }
            });

            AppState.currentAudioObj.onended = () => {
                stopAudio();
                if (AppState.autoAdvanceAudio) {
                    AppState.shouldAutoPlayNext = true;
                    getActiveFeed().scrollBy({ top: window.innerHeight, behavior: 'smooth' });
                }
            };
        }

        function toggleAutoPlay(forceState = null, silent = false) {
            AppState.autoAdvanceAudio = forceState !== null ? forceState : !AppState.autoAdvanceAudio;
            document.querySelectorAll('.autoplay-toggle').forEach(btn => btn.classList.toggle('active', AppState.autoAdvanceAudio));

            if (AppState.autoAdvanceAudio) {
                if (AppState.isAutoScrolling) {
                    AppState.isAutoScrolling = false;
                    document.getElementById('header-autoscroll-btn').classList.remove('active');
                    clearTimeout(AppState.autoScrollTimer);
                }
                if (!silent) showToast("Auto-Advance Audio Enabled");
            } else {
                if (!silent) showToast("Auto-Advance Audio Disabled");
                AppState.shouldAutoPlayNext = false;
            }
        }

        // ==========================================
        // 9. UI HELPERS & NAVIGATION
        // ==========================================
        function switchViewTo(viewId) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('surah-view').classList.add('hidden');
            document.getElementById('settings-view').classList.add('hidden');
            document.getElementById(`${viewId}-view`).classList.remove('hidden');
        }

        function displayHome() {
            haltAllAutomations();
            document.title = "The Qur'an";
            switchViewTo('home');
            if (AppState.verseObserver) AppState.verseObserver.disconnect();
        }

        function displaySettings() {
            haltAllAutomations();
            document.title = "Settings - The Qur'an";
            switchViewTo('settings');
        }

        function updateTabUI(tab) {
            AppState.currentTab = tab;
            document.getElementById('tab-trans').classList.toggle('active', tab === 'trans');
            document.getElementById('tab-arabic').classList.toggle('active', tab === 'arabic');

            const titleEl = document.getElementById('persistent-chapter-title');
            if (tab === 'arabic') {
                titleEl.innerText = AppState.currentArabicSurahName;
                titleEl.classList.add('arabic-mode');
            } else {
                titleEl.innerText = SURAH_META[AppState.currentSurahIndex - 1]?.name || '';
                titleEl.classList.remove('arabic-mode');
            }
            updateProgressBar();
        }

        function switchTabTo(tab) {
            updateTabUI(tab);
            DOM.tabCarousel.scrollTo({ left: tab === 'arabic' ? window.innerWidth : 0, behavior: 'smooth' });
        }

        function updateNavigationUI(index) {
            document.getElementById('prev-surah-btn').classList.toggle('invisible', index <= 1);
            document.getElementById('next-surah-btn').classList.toggle('invisible', index >= 114);
        }

        function triggerGestureHint() {
            const swipeHint = document.getElementById('swipe-hint');
            if (!AppState.hasSwipedUp) {
                swipeHint.classList.remove('hidden', 'fade-out');
            } else {
                swipeHint.classList.add('hidden');
            }
        }

        function initNavTooltips() {
            addLongPressListener(document.getElementById('prev-surah-btn'), "Previous Surah");
            addLongPressListener(document.getElementById('home-btn'), "Return to Library");
            addLongPressListener(document.getElementById('next-surah-btn'), "Next Surah");
        }

        // ==========================================
        // 10. BOOKMARKS
        // ==========================================
        function toggleBookmark(sIdx, vIdx, name, btnEl) {
            const exists = AppState.bookmarks.findIndex(b => b.surah == sIdx && b.verse == vIdx);
            if (exists > -1) {
                AppState.bookmarks.splice(exists, 1);
                document.querySelectorAll(`[data-verse="${vIdx}"] .bookmark-btn`).forEach(b => b.classList.remove('active'));
                showToast("Bookmark Removed");
            } else {
                AppState.bookmarks.push({ surah: sIdx, verse: vIdx, name: name });
                document.querySelectorAll(`[data-verse="${vIdx}"] .bookmark-btn`).forEach(b => b.classList.add('active'));
                showToast("Bookmark Added");
            }
            localStorage.setItem('quran_bookmarks', JSON.stringify(AppState.bookmarks));
            renderBookmarks();
        }

        function renderBookmarks() {
            const list = document.getElementById('bookmarks-list');
            list.innerHTML = '';
            if (AppState.bookmarks.length === 0) return list.innerHTML = `<p style="color: var(--text-muted); font-size: 0.9rem; text-align: center;">No bookmarks saved yet.</p>`;

            AppState.bookmarks.sort((a, b) => a.surah - b.surah || parseInt(a.verse) - parseInt(b.verse));
            AppState.bookmarks.forEach((bm) => {
                const li = document.createElement('li'); li.className = 'bookmark-item';
                li.innerHTML = `<div class="bookmark-info"><span class="bookmark-title">Surah ${bm.name}</span><span class="bookmark-snippet">Verse ${bm.verse}</span></div>
                                <button class="bookmark-delete" aria-label="Delete"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>`;
                li.querySelector('.bookmark-info').onclick = () => openSurah(bm.surah, bm.verse);
                li.querySelector('.bookmark-delete').onclick = (e) => { e.stopPropagation(); toggleBookmark(bm.surah, bm.verse, bm.name, null); };
                list.appendChild(li);
            });
        }

        // ==========================================
        // 11. EVENT LISTENERS & SCRUBBING
        // ==========================================
        document.getElementById('open-settings-btn').onclick = () => { history.pushState({ view: 'settings' }, '', '#settings'); displaySettings(); };
        document.getElementById('close-settings-btn').onclick = () => { history.pushState({ view: 'home' }, '', window.location.pathname); displayHome(); };
        document.getElementById('prev-surah-btn').onclick = () => openSurah(AppState.currentSurahIndex - 1);
        document.getElementById('home-btn').onclick = () => { history.pushState({ view: 'home' }, '', ' '); displayHome(); };
        document.getElementById('next-surah-btn').onclick = () => openSurah(AppState.currentSurahIndex + 1);

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('surah-view').classList.contains('hidden')) return;
            if (e.key === 'ArrowDown') { haltAllAutomations(); getActiveFeed().scrollBy({ top: window.innerHeight, behavior: 'smooth' }); }
            if (e.key === 'ArrowUp') { haltAllAutomations(); getActiveFeed().scrollBy({ top: -window.innerHeight, behavior: 'smooth' }); }
            if (e.key === 'ArrowRight' && AppState.currentTab === 'trans') switchTabTo('arabic');
            if (e.key === 'ArrowLeft' && AppState.currentTab === 'arabic') switchTabTo('trans');
        });

        function initScrubbing() {
            const track = document.getElementById('progress-track');
            let isScrubbing = false;

            const handleScrub = (e) => {
                if (!isScrubbing) return;
                const rect = track.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let percentage = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));

                DOM.transFeed.scrollTop = percentage * (DOM.transFeed.scrollHeight - DOM.transFeed.clientHeight);
                DOM.arabicFeed.scrollTop = percentage * (DOM.arabicFeed.scrollHeight - DOM.arabicFeed.clientHeight);
            };

            const startScrub = (e) => {
                isScrubbing = true;
                DOM.transFeed.style.scrollBehavior = 'auto';
                DOM.arabicFeed.style.scrollBehavior = 'auto';
                haltAllAutomations();
                handleScrub(e);
            };

            const stopScrub = () => {
                if (isScrubbing) {
                    isScrubbing = false;
                    DOM.transFeed.style.scrollBehavior = 'smooth';
                    DOM.arabicFeed.style.scrollBehavior = 'smooth';
                    DOM.transFeed.scrollBy(0, 0);
                    DOM.arabicFeed.scrollBy(0, 0);
                }
            };

            track.addEventListener('mousedown', startScrub); window.addEventListener('mousemove', handleScrub); window.addEventListener('mouseup', stopScrub);
            track.addEventListener('touchstart', startScrub, { passive: true }); track.addEventListener('touchmove', handleScrub, { passive: true }); track.addEventListener('touchend', stopScrub);
        }

        const updateProgressBar = () => {
            const active = getActiveFeed();
            const pb = document.getElementById('progress-bar');
            if (active && pb) pb.style.width = `${(active.scrollTop / (active.scrollHeight - active.clientHeight || 1)) * 100}%`;
        };

        function showToast(message) {
            const toast = document.getElementById('toast-container');
            toast.innerText = message; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function addLongPressListener(element, message) {
            if (!element) return;
            let timer;
            const start = () => { timer = setTimeout(() => { showToast(message); if (navigator.vibrate) navigator.vibrate(50); }, 500); };
            const cancel = () => clearTimeout(timer);
            ['touchstart', 'mousedown'].forEach(evt => element.addEventListener(evt, start, { passive: true }));
            ['touchend', 'mouseup', 'mouseleave'].forEach(evt => element.addEventListener(evt, cancel));
            element.addEventListener('contextmenu', e => e.preventDefault());
        }

        // --- Extracted setting and scroll fade initializers ---
        function initScrollingFades() {
            DOM.tabCarousel.addEventListener('scroll', () => {
                const snapPoint = window.innerWidth / 2;
                if (DOM.tabCarousel.scrollLeft > snapPoint && AppState.currentTab !== 'arabic') updateTabUI('arabic');
                else if (DOM.tabCarousel.scrollLeft <= snapPoint && AppState.currentTab !== 'trans') updateTabUI('trans');
            });

            function handleFeedScroll(feed) {
                updateProgressBar();
                feed.classList.add('is-scrolling');

                if (!AppState.hasSwipedUp && feed.scrollTop > 50) {
                    AppState.hasSwipedUp = true;
                    localStorage.setItem('quran_has_swiped', 'true');
                    const hint = document.getElementById('swipe-hint');
                    if (hint) { hint.classList.add('fade-out'); setTimeout(() => hint.classList.add('hidden'), 300); }
                }
                clearTimeout(feed.scrollFadeTimer);
                feed.scrollFadeTimer = setTimeout(() => feed.classList.remove('is-scrolling'), 200);
            }

            DOM.transFeed.addEventListener('scroll', () => { if (AppState.currentTab === 'trans') handleFeedScroll(DOM.transFeed); });
            DOM.arabicFeed.addEventListener('scroll', () => { if (AppState.currentTab === 'arabic') handleFeedScroll(DOM.arabicFeed); });
        }

        function initSettings() {
            const themeBtn = document.getElementById('theme-toggle');
            const themeMeta = document.getElementById('theme-color-meta');
            let currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

            const applyTheme = (t) => {
                document.documentElement.setAttribute('data-theme', t);
                themeBtn.innerText = t === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
                themeMeta.setAttribute('content', t === 'dark' ? '#0f172a' : '#fcfaf7');
            };
            applyTheme(currentTheme);
            themeBtn.onclick = () => { currentTheme = currentTheme === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', currentTheme); applyTheme(currentTheme); };

            const fontSelect = document.getElementById('arabic-font-select');
            let currentArabicFont = localStorage.getItem('arabicFont') || 'default';
            fontSelect.value = currentArabicFont;
            document.documentElement.setAttribute('data-arabic-font', currentArabicFont);
            fontSelect.addEventListener('change', (e) => {
                currentArabicFont = e.target.value; localStorage.setItem('arabicFont', currentArabicFont);
                document.documentElement.setAttribute('data-arabic-font', currentArabicFont);
            });

            const transSelect = document.getElementById('translation-select');
            transSelect.value = AppState.translationFile;
            transSelect.addEventListener('change', async (e) => {
                AppState.translationFile = e.target.value; localStorage.setItem('translationFile', AppState.translationFile);
                await fetchQuranData();
            });

            // Reciter settings initialization
            const reciterSelect = document.getElementById('reciter-select');
            reciterSelect.value = AppState.reciterPath;
            reciterSelect.addEventListener('change', (e) => {
                AppState.reciterPath = e.target.value;
                localStorage.setItem('reciterPath', AppState.reciterPath);
                stopAudio();
            });

            const speedSlider = document.getElementById('scroll-speed-slider');
            const speedValDisplay = document.getElementById('speed-val');
            speedSlider.value = AppState.autoScrollSpeed; speedValDisplay.innerText = AppState.autoScrollSpeed;
            speedSlider.addEventListener('input', (e) => {
                AppState.autoScrollSpeed = e.target.value; speedValDisplay.innerText = AppState.autoScrollSpeed;
                localStorage.setItem('autoScrollSpeed', AppState.autoScrollSpeed);
            });
        }
    </script>
</body>
