<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Quran - Translations</title>
    <style>
        :root {
            /* Light Theme */
            --bg-base: #fcfaf7;
            --bg-gradient: linear-gradient(180deg, #fdfbf7 0%, #f1f2f6 100%);
            --text-main: #2d3436;
            --text-muted: #57606f;
            --card-bg: #ffffff;
            --card-border: rgba(0, 0, 0, 0.02);
            --card-shadow: rgba(0, 0, 0, 0.03);
            --accent-primary: #e67e22;
            --accent-secondary: #3498db;
            --nav-bg: rgba(255, 255, 255, 0.25);
            --nav-border: rgba(0, 0, 0, 0.05);
            --btn-bg: #ffffff;
            --btn-hover: #3498db;
            --hover-highlight: rgba(230, 126, 34, 0.1);
            --progress-bg: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            /* Midnight Pop Theme */
            --bg-base: #0f172a;
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --card-border: rgba(255, 255, 255, 0.05);
            --card-shadow: rgba(0, 0, 0, 0.4);
            --accent-primary: #fbbf24;
            --accent-secondary: #22d3ee;
            --nav-bg: rgba(15, 23, 42, 0.25);
            --nav-border: rgba(255, 255, 255, 0.1);
            --btn-bg: #334155;
            --btn-hover: #22d3ee;
            --hover-highlight: rgba(251, 191, 36, 0.15);
            --progress-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100dvh;
            font-family: 'Georgia', serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        .invisible {
            visibility: hidden !important;
        }

        /* --- Landing Page --- */
        #home-view {
            height: 100dvh;
            width: 100vw;
            overflow-y: auto;
            padding: 5rem 1.5rem 4rem 1.5rem;
            background: var(--bg-gradient);
            position: relative;
        }

        .theme-toggle-container {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 10;
        }

        .translation-toggle-container {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 10;
        }

        .top-control {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--nav-border);
            padding: 0.6rem 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 4px 10px var(--card-shadow);
            outline: none;
            transition: all 0.2s ease;
        }

        .top-control:hover {
            border-color: var(--accent-secondary);
        }

        .header-title {
            text-align: center;
            margin-bottom: 3rem;
            margin-top: 1rem;
            color: var(--accent-primary);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.8rem;
            font-weight: 300;
        }

        #surah-list {
            list-style: none;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 6rem;
        }

        .surah-item {
            padding: 1.2rem 1.5rem;
            margin-bottom: 0.8rem;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--card-shadow);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            transition: 0.2s;
        }

        .surah-item-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .surah-name {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .surah-translation {
            font-size: 0.85rem;
            font-family: sans-serif;
            opacity: 0.8;
        }

        .surah-item:hover {
            background-color: var(--hover-highlight);
            transform: scale(1.02);
        }

        .surah-item:hover .surah-name {
            color: var(--accent-primary);
        }

        /* --- Swiping Feed View --- */
        #surah-view {
            position: relative;
            height: 100dvh;
            width: 100vw;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: var(--nav-bg);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--nav-border);
            z-index: 100;
            height: 60px;
        }

        .persistent-title {
            font-size: 0.9rem;
            color: var(--accent-primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .persistent-verse {
            font-size: 0.8rem;
            color: var(--accent-secondary);
            font-family: sans-serif;
            letter-spacing: 1px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-top: 1px solid var(--nav-border);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: var(--progress-bg);
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-secondary);
            box-shadow: 0 0 10px var(--accent-secondary);
            transition: width 0.2s ease-out;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.5rem;
            padding-bottom: calc(1.2rem + env(safe-area-inset-bottom, 0px));
        }

        .nav-btn {
            background: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--nav-border);
            padding: 0.6rem 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: sans-serif;
            font-weight: bold;
            box-shadow: 0 2px 8px var(--card-shadow);
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: var(--btn-hover);
            color: #fff;
        }

        #home-btn {
            background: var(--accent-primary);
            color: #000;
            border-color: var(--accent-primary);
        }

        /* --- Feed Container --- */
        .feed-container {
            height: 100dvh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .feed-container::-webkit-scrollbar {
            display: none;
        }

        .verse-screen {
            height: 100dvh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6rem 2rem 8rem 2rem;
            text-align: center;
        }

        .verse-text {
            font-size: 2rem;
            line-height: 1.6;
            max-width: 800px;
            text-wrap: balance;
            color: var(--text-main);
        }

        .verse-text.long-verse {
            font-size: 1.4rem;
        }

        .verse-text.extra-long-verse {
            font-size: 1.1rem;
        }

        @media (max-width: 600px) {
            .verse-text {
                font-size: 1.5rem;
            }

            .verse-text.long-verse {
                font-size: 1.2rem;
            }

            .verse-text.extra-long-verse {
                font-size: 1.05rem;
            }

            .top-control {
                padding: 0.5rem 0.8rem;
                font-size: 0.75rem;
            }

            .header-title {
                margin-top: 2.5rem;
            }
        }
    </style>
</head>

<body>

    <div id="home-view">
        <div class="translation-toggle-container">
            <select id="translation-select" class="top-control">
                <option value="en.itani.xml">English (Itani)</option>
                <option value="en.sahih.xml">English (Sahih)</option>
                <option value="en.yusufali.xml">English (Yusuf Ali)</option>
                <option value="en.transliteration.xml">English (Transliteration)</option>
                <option value="quran-simple.xml">Arabic</option>  
            </select>
        </div>

        <div class="theme-toggle-container">
            <button id="theme-toggle" class="top-control">🌙</button>
        </div>

        <h1 class="header-title">The Quran</h1>
        <div id="loading" style="text-align: center; color: var(--text-muted);">Opening library...</div>
        <ul id="surah-list"></ul>
    </div>

    <div id="surah-view" class="hidden">
        <div class="top-bar">
            <div id="persistent-chapter-title" class="persistent-title"></div>
            <div id="persistent-verse-number" class="persistent-verse"></div>
        </div>

        <div class="feed-container" id="feed-container"></div>

        <div class="bottom-bar">
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div class="nav-buttons">
                <div style="flex:1; display:flex;"><button class="nav-btn" id="prev-surah-btn">← Prev</button></div>
                <div style="flex:1; display:flex; justify-content:center;"><button class="nav-btn"
                        id="home-btn">Home</button></div>
                <div style="flex:1; display:flex; justify-content:flex-end;"><button class="nav-btn"
                        id="next-surah-btn">Next →</button></div>
            </div>
        </div>
    </div>

            { "index": 114, "name": "An-Nas", "translation": "Mankind" }

        let quranData = null;
        let currentSurahIndex = 1;
        let currentVerseObserver = null;

        // Theme Toggle Logic
        const themeBtn = document.getElementById('theme-toggle');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        let currentTheme = localStorage.getItem('theme') || (prefersDark ? 'dark' : 'light');

        const applyTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            themeBtn.innerText = theme === 'dark' ? '☀️' : '🌙';
        };
        applyTheme(currentTheme);

        themeBtn.onclick = () => {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            applyTheme(currentTheme);
        };

        // Translation Selection Logic
        const transSelect = document.getElementById('translation-select');
        let currentTranslationFile = localStorage.getItem('translationFile') || 'en.itani.xml';
        transSelect.value = currentTranslationFile;

        transSelect.addEventListener('change', async (e) => {
            currentTranslationFile = e.target.value;
            localStorage.setItem('translationFile', currentTranslationFile);
            document.getElementById('surah-list').innerHTML = '';
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('loading').innerText = "Loading new translation...";
            await loadQuran();
        });

        const updateProgressBar = () => {
            const feed = document.getElementById('feed-container');
            const progressBar = document.getElementById('progress-bar');
            if (!feed || !progressBar) return;
            const totalHeight = feed.scrollHeight - feed.clientHeight;
            const progress = totalHeight > 0 ? (feed.scrollTop / totalHeight) * 100 : 100;
            progressBar.style.width = `${progress}%`;
        };

        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.view === 'surah') { displaySurah(e.state.index); }
            else { displayHome(); }
        });

        window.onload = async () => {
            await loadQuran();
            const hash = window.location.hash;
            if (hash.startsWith('#surah-')) {
                displaySurah(hash.replace('#surah-', ''));
            } else {
                displayHome();
            }
            document.getElementById('feed-container').addEventListener('scroll', updateProgressBar);
        };

        async function loadQuran() {
            try {
                const response = await fetch(currentTranslationFile);
                if (!response.ok) throw new Error("File not found");

                const xmlText = await response.text();
                const parser = new DOMParser();
                quranData = parser.parseFromString(xmlText, "text/xml");

                document.getElementById('loading').classList.add('hidden');
                renderSurahList();
            } catch (e) {
                document.getElementById('loading').innerText = `Error loading ${currentTranslationFile}. Please make sure the file exists.`;
            }
        }

        function renderSurahList() {
            const list = document.getElementById('surah-list');
            list.innerHTML = '';

            const surahs = quranData.querySelectorAll('sura');
            surahs.forEach(sura => {
                const index = parseInt(sura.getAttribute('index'));
                const meta = SURAH_META[index - 1];

                const li = document.createElement('li');
                li.className = 'surah-item';
                li.innerHTML = `
                    <div class="surah-item-info">
                        <span class="surah-name">${index}. ${meta.name}</span>
                        <span class="surah-translation">${meta.translation}</span>
                    </div>
                    <span style="opacity: 0.3;">›</span>
                `;
                li.onclick = () => openSurah(index);
                list.appendChild(li);
            });
        }

        function openSurah(index) {
            history.pushState({ view: 'surah', index: index }, '', `#surah-${index}`);
            displaySurah(index);
        }

        function displayHome() {
            document.getElementById('surah-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('feed-container').innerHTML = '';
            if (currentVerseObserver) currentVerseObserver.disconnect();
        }

        function displaySurah(index) {
            currentSurahIndex = parseInt(index);
            const suraNode = quranData.querySelector(`sura[index="${index}"]`);
            if (!suraNode) return displayHome();

            const feed = document.getElementById('feed-container');
            document.getElementById('prev-surah-btn').classList.toggle('invisible', currentSurahIndex <= 1);
            document.getElementById('next-surah-btn').classList.toggle('invisible', currentSurahIndex >= 114);

            if (currentVerseObserver) currentVerseObserver.disconnect();

            feed.style.scrollBehavior = 'auto';
            feed.scrollTop = 0;
            feed.innerHTML = '';
            document.getElementById('progress-bar').style.width = '0%';

            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('surah-view').classList.remove('hidden');

            const meta = SURAH_META[currentSurahIndex - 1];
            document.title = `Surah ${meta.name}`;
            document.getElementById('persistent-chapter-title').innerText = meta.name;
            document.getElementById('persistent-verse-number').innerText = ``; // Cleared initially

            // --- BISMILLAH INJECTION ---
            // Injects the first verse of the first Surah for every chapter EXCEPT 1 and 9.
            if (currentSurahIndex > 1 && currentSurahIndex !== 9) {
                const bismillahNode = quranData.querySelector('sura[index="1"] aya[index="1"]');
                const bismillahText = bismillahNode ? bismillahNode.getAttribute('text') : "In the name of God, the Gracious, the Merciful.";

                const bScreen = document.createElement('div');
                bScreen.className = 'verse-screen';
                bScreen.dataset.verse = 'bismillah'; // Tag for the observer
                bScreen.innerHTML = `<div class="verse-text">${bismillahText}</div>`;
                feed.appendChild(bScreen);
            }

            suraNode.querySelectorAll('aya').forEach(aya => {
                const text = aya.getAttribute('text');
                const verseIndex = aya.getAttribute('index');
                const screen = document.createElement('div');
                screen.className = 'verse-screen';
                screen.dataset.verse = verseIndex; // Tag for the observer

                let tClass = text.length > 700 ? 'extra-long-verse' : (text.length > 350 ? 'long-verse' : '');
                if (text.length > 700) screen.style.justifyContent = 'flex-start';

                screen.innerHTML = `<div class="verse-text ${tClass}">${text}</div>`;
                feed.appendChild(screen);
            });

            // Intersection Observer to track which verse is visible and update the top bar
            const options = { root: feed, rootMargin: '0px', threshold: 0.5 };
            currentVerseObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const activeVerse = entry.target.dataset.verse;
                        if (activeVerse === 'bismillah') {
                            document.getElementById('persistent-verse-number').innerText = "";
                        } else {
                            document.getElementById('persistent-verse-number').innerText = `V. ${index}:${activeVerse}`;
                        }
                    }
                });
            }, options);

            // Observe all newly created screens
            document.querySelectorAll('.verse-screen').forEach(screen => {
                currentVerseObserver.observe(screen);
            });

            feed.scrollTop = 0;
            setTimeout(() => { feed.style.scrollBehavior = 'smooth'; updateProgressBar(); }, 50);
        }

        document.getElementById('prev-surah-btn').onclick = () => openSurah(currentSurahIndex - 1);
        document.getElementById('home-btn').onclick = () => { history.pushState({ view: 'home' }, '', ' '); displayHome(); };
        document.getElementById('next-surah-btn').onclick = () => openSurah(currentSurahIndex + 1);

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('surah-view').classList.contains('hidden')) return;
            const c = document.getElementById('feed-container');
            if (e.key === 'ArrowDown') c.scrollBy(0, window.innerHeight);
            if (e.key === 'ArrowUp') c.scrollBy(0, -window.innerHeight);
            if (e.key === 'ArrowLeft' && currentSurahIndex > 1) openSurah(currentSurahIndex - 1);
            if (e.key === 'ArrowRight' && currentSurahIndex < 114) openSurah(currentSurahIndex + 1);
        });
    </script>
</body>

</html>
